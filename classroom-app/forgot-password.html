<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Forgot Password · Classroom</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2d2d2d">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<style>
  :root{
    --bg: #2d2d2d; --card: #3d3d3d; --card-2: #464646; --border: #4a4a4a;
    --ink: #f4f2ee; --ink-dim: #b7b3ab; --accent-green: #2f5c34;
    --accent-green-bright: #4c8a52; --danger: #e08080; --radius: 12px;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    min-height:100vh; }
  .wrap { max-width:400px; margin:0 auto; min-height:100vh; display:flex;
    flex-direction:column; justify-content:center; padding:32px 24px; }
  .brand { text-align:center; margin-bottom:32px; }
  .brand .glyph { font-size:34px; margin-bottom:10px; }
  .brand h1 { font-size:22px; font-weight:700; margin:0; }
  .brand p { color:var(--ink-dim); font-size:13.5px; margin:6px 0 0; line-height:1.5; }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:12.5px; font-weight:600; color:var(--ink-dim);
    text-transform:uppercase; letter-spacing:0.03em; margin-bottom:7px; }
  .field input { width:100%; background:var(--card-2); border:1px solid var(--border);
    border-radius:10px; padding:13px; color:var(--ink); font-size:15px; font-family:inherit; }
  .field input:focus { outline:none; border-color:var(--accent-green-bright); }
  .error { color:var(--danger); font-size:13px; margin:-6px 0 14px; min-height:16px; }
  .btn-primary { width:100%; background:var(--accent-green); color:#eaf5ea; border:none;
    border-radius:10px; padding:14px; font-size:15.5px; font-weight:600; cursor:pointer; margin-top:6px; }
  .btn-primary:disabled { opacity:0.6; }
  .switch { text-align:center; margin-top:20px; font-size:13.5px; color:var(--ink-dim); }
  .switch a { color:var(--accent-green-bright); font-weight:600; text-decoration:none; }
  .success-box { text-align:center; padding:20px; background:var(--card); border:1px solid var(--border); border-radius:var(--radius); }
  .success-box .glyph { font-size:32px; margin-bottom:10px; }
  .success-box p { color:var(--ink-dim); font-size:14px; margin-top:6px; line-height:1.5; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="glyph">🔑</div>
      <h1>Reset your password</h1>
      <p>Enter the email you signed up with and we'll send you a link to set a new password.</p>
    </div>

    <form id="resetForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="error" id="errorMsg"></div>
      <button type="submit" class="btn-primary" id="submitBtn">Send Reset Link</button>
    </form>

    <div id="successBox" class="success-box" style="display:none;">
      <div class="glyph">📬</div>
      <strong>Check your email</strong>
      <p>If an account exists for that address, a password reset link is on its way. It can take a couple of minutes to arrive — check your spam folder too.</p>
    </div>

    <div class="switch"><a href="login.html">Back to log in</a></div>
  </div>

  <script>
    document.getElementById("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const errorMsg = document.getElementById("errorMsg");
      const submitBtn = document.getElementById("submitBtn");
      errorMsg.textContent = "";
      submitBtn.disabled = true;
      submitBtn.textContent = "Sending…";

      const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + window.location.pathname.replace("forgot-password.html", "reset-password.html")
      });

      submitBtn.disabled = false;
      submitBtn.textContent = "Send Reset Link";

      // Show the success state regardless of whether the email exists —
      // this avoids letting someone probe which emails have accounts.
      if (error && error.status && error.status >= 500) {
        errorMsg.textContent = "Something went wrong. Please try again in a moment.";
        return;
      }
      document.getElementById("resetForm").style.display = "none";
      document.getElementById("successBox").style.display = "block";
    });
  </script>
</body>
</html>
