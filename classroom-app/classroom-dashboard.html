<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Classroom</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2d2d2d">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="offline-store.js"></script>
<style>
  :root{
    --bg: #2d2d2d;
    --card: #3d3d3d;
    --badge: #262626;
    --border: #484848;
    --ink: #f4f2ee;
    --ink-dim: #b7b3ab;
    --ring-track: #6b6b6b;
    --ring-fill: #eef0e6;
    --accent-green: #2f5c34;
    --radius: 12px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---- Top bar ---- */
  .topbar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    padding-top: max(14px, env(safe-area-inset-top));
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 5;
  }

  .icon-btn {
    background: none;
    border: none;
    color: var(--ink);
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  .icon-btn svg { width: 22px; height: 22px; }

  .topbar h1 {
    flex: 1;
    font-size: 22px;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .study-plan-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--accent-green);
    color: #eaf5ea;
    border: none;
    border-radius: 999px;
    padding: 9px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
  }

  .study-plan-btn svg { width: 15px; height: 15px; }

  /* ---- Card list ---- */
  .subject-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 6px 14px 28px;
    flex: 1;
  }

  .subject-card {
    position: relative;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 16px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    min-height: 220px;
    justify-content: center;
    transition: transform 0.15s ease, background 0.15s ease;
  }

  .subject-card:active {
    transform: scale(0.98);
  }

  .subject-index {
    position: absolute;
    top: 14px;
    left: 14px;
    background: var(--badge);
    color: var(--ink-dim);
    font-size: 13px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 999px;
  }

  .subject-icon {
    width: 84px;
    height: 84px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    line-height: 1;
    margin-bottom: 14px;
  }

  .subject-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .subject-name {
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
  }

  /* ---- Circular progress, top-right corner ---- */
  .progress-ring {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 56px;
    height: 56px;
  }

  .progress-ring svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .progress-ring circle {
    fill: none;
    stroke-width: 4;
  }

  .progress-ring .ring-track {
    stroke: var(--ring-track);
  }

  .progress-ring .ring-fill {
    stroke: #7bd88f;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.8s cubic-bezier(0.65, 0, 0.35, 1);
  }

  .progress-ring .ring-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink);
  }

  @media (max-width: 360px) {
    .subject-list { padding-left: 10px; padding-right: 10px; }
    .subject-icon { width: 72px; height: 72px; font-size: 44px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .progress-ring .ring-fill { transition: none; }
  }

  .offline-banner {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 4px 14px 10px;
    padding: 9px 13px;
    background: #4a3a20;
    border: 1px solid #6b5530;
    border-radius: 10px;
    color: #f0d9a8;
    font-size: 12.5px;
    font-weight: 500;
  }
  .offline-banner .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #e0a458; flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <button class="icon-btn" aria-label="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <h1>Classroom</h1>
    <button class="study-plan-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Study Plan
    </button>
    <button class="icon-btn" aria-label="Log out" onclick="logout('login.html')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
    </button>
  </header>

  <div class="offline-banner" id="offlineBanner" hidden>
    <span class="dot"></span> You're offline — showing saved data
  </div>

  <main class="subject-list" id="subjectList" aria-label="Subject progress list"></main>
</div>

<script>
  // ---------------------------------------------------------------
  // Data source — every card below is generated from this array.
  // Edit id / name / icon / progress here; nothing else needs to change.
  // ---------------------------------------------------------------
  const subjects = [
    { id: "civic-ed",       name: "Civic Education", icon: "⚖️",  progress: 0 },
    { id: "english",        name: "English",         icon: "📖",  progress: 1 },
    { id: "ict",            name: "ICT",             icon: "🌐",  progress: 2 },
    { id: "mathematics",    name: "Mathematics",     icon: "🧮",  progress: 1 },
    { id: "science",        name: "Science",         icon: "🧠",  progress: 0 },
    { id: "social-studies", name: "Social Studies",  icon: "🏠",  progress: 0 }
  ];

  const RING_RADIUS = 24;
  const RING_CIRCUMFERENCE = 2 * Math.PI * RING_RADIUS;

  function buildRing(progress) {
    const clamped = Math.max(0, Math.min(100, progress));
    const offset = RING_CIRCUMFERENCE * (1 - clamped / 100);
    return `
      <div class="progress-ring">
        <svg viewBox="0 0 56 56">
          <circle class="ring-track" cx="28" cy="28" r="${RING_RADIUS}"></circle>
          <circle class="ring-fill" cx="28" cy="28" r="${RING_RADIUS}"
            stroke-dasharray="${RING_CIRCUMFERENCE}"
            stroke-dashoffset="${RING_CIRCUMFERENCE}"
            data-final-offset="${offset}"></circle>
        </svg>
        <div class="ring-label">${clamped}%</div>
      </div>`;
  }

  function buildCard(subject, index) {
    const card = document.createElement("article");
    card.className = "subject-card";
    card.setAttribute("role", "listitem");
    card.style.cursor = "pointer";
    card.addEventListener("click", () => {
      window.location.href = `subject.html?id=${encodeURIComponent(subject.id)}`;
    });

    card.innerHTML = `
      <span class="subject-index">#${index + 1}</span>
      ${buildRing(subject.progress)}
      <div class="subject-icon" aria-hidden="true">${subject.icon}</div>
      <div class="subject-name">${subject.name}</div>
    `;
    return card;
  }

  function renderSubjects() {
    const list = document.getElementById("subjectList");
    list.innerHTML = "";
    subjects.forEach((subject, index) => {
      list.appendChild(buildCard(subject, index));
    });

    requestAnimationFrame(() => {
      document.querySelectorAll(".ring-fill").forEach(circle => {
        circle.style.strokeDashoffset = circle.dataset.finalOffset;
      });
    });
  }

  function updateOfflineBanner() {
    document.getElementById("offlineBanner").hidden = navigator.onLine;
  }
  window.addEventListener("online", updateOfflineBanner);
  window.addEventListener("offline", updateOfflineBanner);

  registerServiceWorker();

  (async () => {
    updateOfflineBanner();
    const user = await requireUser(); // redirects to login.html if not signed in
    if (!user) return;
    renderSubjects();
  })();
</script>

</body>
</html>
