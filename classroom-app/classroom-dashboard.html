<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Classroom</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2d2d2d">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="offline-store.js"></script>
<script src="subjects.js"></script>
<style>
  :root{
    --bg: #2d2d2d;
    --card: #3d3d3d;
    --badge: #262626;
    --border: #484848;
    --ink: #f4f2ee;
    --ink-dim: #b7b3ab;
    --ring-track: #6b6b6b;
    --ring-fill: #eef0e6;
    --accent-green: #2f5c34;
    --radius: 12px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---- Top bar ---- */
  .topbar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    padding-top: max(14px, env(safe-area-inset-top));
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 5;
  }

  .icon-btn {
    background: none;
    border: none;
    color: var(--ink);
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  .icon-btn svg { width: 22px; height: 22px; }

  .topbar h1 {
    flex: 1;
    font-size: 22px;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .study-plan-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--accent-green);
    color: #eaf5ea;
    text-decoration: none;
    border: none;
    border-radius: 999px;
    padding: 9px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
  }

  .study-plan-btn svg { width: 15px; height: 15px; }

  /* ---- Card list ---- */
  .subject-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 6px 14px 28px;
    flex: 1;
  }

  .subject-card {
    position: relative;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 16px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    min-height: 220px;
    justify-content: center;
    transition: transform 0.15s ease, background 0.15s ease;
  }

  .subject-card:active {
    transform: scale(0.98);
  }

  .subject-index {
    position: absolute;
    top: 14px;
    left: 14px;
    background: var(--badge);
    color: var(--ink-dim);
    font-size: 13px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 999px;
  }

  .subject-icon {
    width: 84px;
    height: 84px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    line-height: 1;
    margin-bottom: 14px;
  }

  .subject-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .subject-name {
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
  }

  /* ---- Circular progress, top-right corner ---- */
  .progress-ring {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 56px;
    height: 56px;
  }

  .progress-ring svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .progress-ring circle {
    fill: none;
    stroke-width: 4;
  }

  .progress-ring .ring-track {
    stroke: var(--ring-track);
  }

  .progress-ring .ring-fill {
    stroke: #7bd88f;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.8s cubic-bezier(0.65, 0, 0.35, 1);
  }

  .progress-ring .ring-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink);
  }

  @media (max-width: 360px) {
    .subject-list { padding-left: 10px; padding-right: 10px; }
    .subject-icon { width: 72px; height: 72px; font-size: 44px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .progress-ring .ring-fill { transition: none; }
  }

  .offline-banner {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 4px 14px 10px;
    padding: 9px 13px;
    background: #4a3a20;
    border: 1px solid #6b5530;
    border-radius: 10px;
    color: #f0d9a8;
    font-size: 12.5px;
    font-weight: 500;
  }
  .offline-banner .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #e0a458; flex-shrink: 0;
  }

  .weak-areas-banner {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 4px 14px 14px;
    padding: 13px 14px;
    background: var(--card);
    border: 1px solid var(--accent-green-bright);
    border-radius: 12px;
    text-decoration: none;
    color: var(--ink);
  }
  .weak-areas-banner .glyph { font-size: 22px; flex-shrink: 0; }
  .weak-areas-banner .weak-areas-text { flex: 1; display: flex; flex-direction: column; gap: 1px; }
  .weak-areas-banner .weak-areas-text strong { font-size: 14px; }
  .weak-areas-banner .weak-areas-text span:last-child { font-size: 12px; color: var(--ink-dim); }
  .weak-areas-banner svg { width: 16px; height: 16px; color: var(--ink-faint); flex-shrink: 0; }

  .tutor-fab {
    position: fixed;
    right: 18px;
    bottom: calc(20px + env(safe-area-inset-bottom));
    width: 74px;
    height: 74px;
    border-radius: 50%;
    background: var(--accent-green);
    border: 3px solid var(--bg);
    box-shadow: 0 0 0 2px var(--accent-green), 0 10px 24px -6px rgba(0,0,0,0.55);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    color: #eaf5ea;
    text-decoration: none;
    z-index: 30;
    transition: transform 0.15s ease;
  }
  .tutor-fab:active { transform: scale(0.94); }
  .tutor-fab svg { width: 24px; height: 24px; }
  .tutor-fab span {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.01em;
    line-height: 1.1;
    text-align: center;
  }
</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <button class="icon-btn" aria-label="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <h1>Classroom</h1>
    <a class="study-plan-btn" href="study-plan.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Study Plan
    </a>
    <a class="icon-btn" href="upgrade.html" aria-label="Go Premium">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    </a>
    <button class="icon-btn" aria-label="Log out" onclick="logout('login.html')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
    </button>
  </header>

  <div class="offline-banner" id="offlineBanner" hidden>
    <span class="dot"></span> You're offline — showing saved data
  </div>

  <a class="weak-areas-banner" href="weak-areas.html">
    <span class="glyph">🎯</span>
    <span class="weak-areas-text">
      <strong>Weak Areas</strong>
      <span>See which topics need more practice</span>
    </span>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
  </a>

  <main class="subject-list" id="subjectList" aria-label="Subject progress list"></main>
</div>

<a class="tutor-fab" href="ai-tutor.html" aria-label="Open Class Tutor">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="7" width="16" height="12" rx="2"/><path d="M12 7V3M8 3h8"/><circle cx="9" cy="13" r="1"/><circle cx="15" cy="13" r="1"/><path d="M8 17h8"/></svg>
  <span>Class<br>Tutor</span>
</a>

<script>
  // Subject list comes from subjects.js (shared across every page).
  // Progress percentages are fetched live from the "progress" table below.

  const RING_RADIUS = 24;
  const RING_CIRCUMFERENCE = 2 * Math.PI * RING_RADIUS;

  function buildRing(progress) {
    const clamped = Math.max(0, Math.min(100, progress));
    const offset = RING_CIRCUMFERENCE * (1 - clamped / 100);
    return `
      <div class="progress-ring">
        <svg viewBox="0 0 56 56">
          <circle class="ring-track" cx="28" cy="28" r="${RING_RADIUS}"></circle>
          <circle class="ring-fill" cx="28" cy="28" r="${RING_RADIUS}"
            stroke-dasharray="${RING_CIRCUMFERENCE}"
            stroke-dashoffset="${RING_CIRCUMFERENCE}"
            data-final-offset="${offset}"></circle>
        </svg>
        <div class="ring-label">${clamped}%</div>
      </div>`;
  }

  function buildCard(subject, index, progress) {
    const card = document.createElement("article");
    card.className = "subject-card";
    card.setAttribute("role", "listitem");
    card.style.cursor = "pointer";
    card.addEventListener("click", () => {
      window.location.href = `subject.html?id=${encodeURIComponent(subject.id)}`;
    });

    card.innerHTML = `
      <span class="subject-index">#${index + 1}</span>
      ${buildRing(progress)}
      <div class="subject-icon" aria-hidden="true">${subject.icon}</div>
      <div class="subject-name">${subject.name}</div>
    `;
    return card;
  }

  async function fetchProgressMap(userId) {
    try {
      const { data, error } = await supabaseClient
        .from("progress")
        .select("subject_id, percent")
        .eq("user_id", userId);
      if (error || !data) return {};
      const map = {};
      data.forEach(row => { map[row.subject_id] = row.percent; });
      return map;
    } catch (err) {
      return {}; // offline or network hiccup — fall back to showing 0% rather than breaking the page
    }
  }

  async function renderSubjects(userId) {
    const progressMap = await fetchProgressMap(userId);
    const list = document.getElementById("subjectList");
    list.innerHTML = "";
    SUBJECTS.forEach((subject, index) => {
      list.appendChild(buildCard(subject, index, progressMap[subject.id] || 0));
    });

    requestAnimationFrame(() => {
      document.querySelectorAll(".ring-fill").forEach(circle => {
        circle.style.strokeDashoffset = circle.dataset.finalOffset;
      });
    });
  }

  function updateOfflineBanner() {
    document.getElementById("offlineBanner").hidden = navigator.onLine;
  }
  window.addEventListener("online", updateOfflineBanner);
  window.addEventListener("offline", updateOfflineBanner);

  registerServiceWorker();

  (async () => {
    updateOfflineBanner();
    const user = await requireUser(); // redirects to login.html if not signed in
    if (!user) return;
    renderSubjects(user.id);
  })();
</script>

</body>
</html>
