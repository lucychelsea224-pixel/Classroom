<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Classroom</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2d2d2d">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="offline-store.js"></script>
<style>
  :root{ --bg:#2d2d2d; --accent-green:#2f5c34; --ink:#f4f2ee; --ink-dim:#b7b3ab; }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .splash { text-align:center; padding:32px; }
  .logo {
    width:72px; height:72px; border-radius:18px; background:var(--accent-green);
    display:flex; align-items:center; justify-content:center; font-size:34px;
    margin:0 auto 18px; color:#eaf5ea; font-weight:700; font-family: Georgia, serif;
  }
  h1 { font-size:22px; font-weight:700; margin:0 0 6px; }
  p { color:var(--ink-dim); font-size:13.5px; margin:0; }
  .spinner {
    width:22px; height:22px; margin:22px auto 0; border-radius:50%;
    border:3px solid rgba(244,242,238,0.15); border-top-color:var(--accent-green);
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="splash">
    <div class="logo">C</div>
    <h1>Classroom</h1>
    <p>Getting things ready…</p>
    <div class="spinner"></div>
  </div>

  <script>
    registerServiceWorker();

    (async () => {
      // requireUser() redirects to login.html on its own if there's no
      // session, so we only need to handle the "already logged in" case.
      const user = await requireUser();
      if (!user) return;
      window.location.href = "classroom-dashboard.html";
    })();
  </script>
</body>
</html>
