<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Subject · Classroom</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2d2d2d">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="offline-store.js"></script>
<script src="subjects.js"></script>
<style>
  :root{
    --bg: #2d2d2d; --card: #3d3d3d; --border: #4a4a4a;
    --ink: #f4f2ee; --ink-dim: #b7b3ab; --ink-faint: #857f75;
    --accent-green: #2f5c34; --accent-green-bright: #4c8a52; --radius: 12px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    -webkit-font-smoothing: antialiased; min-height:100vh; }
  a { color:inherit; text-decoration:none; }

  .app { max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }

  .topbar { display:flex; align-items:center; gap:14px; padding:14px 16px;
    padding-top:max(14px, env(safe-area-inset-top)); position:sticky; top:0; background:var(--bg); z-index:5; }
  .icon-btn { background:none; border:none; color:var(--ink); padding:4px; display:flex;
    align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .icon-btn svg { width:22px; height:22px; }
  .topbar h1 { flex:1; font-size:20px; font-weight:600; margin:0; letter-spacing:-0.01em; }

  .subject-hero {
    display:flex; flex-direction:column; align-items:center; text-align:center;
    padding:24px 20px 8px;
  }
  .subject-hero .icon { font-size:56px; margin-bottom:12px; line-height:1; }
  .subject-hero h2 { font-size:22px; font-weight:700; margin:0 0 4px; }
  .subject-hero p { font-size:13.5px; color:var(--ink-dim); margin:0; }

  .options { display:flex; flex-direction:column; gap:14px; padding:20px 16px 32px; }

  .option-card {
    display:flex; align-items:center; gap:16px;
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    padding:18px; cursor:pointer; transition:transform 0.15s ease, background 0.15s ease;
  }
  .option-card:active { transform:scale(0.98); }

  .option-glyph {
    width:52px; height:52px; border-radius:12px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:26px;
    background: rgba(76,138,82,0.16);
  }

  .option-body { flex:1; min-width:0; }
  .option-body h3 { margin:0 0 3px; font-size:16px; font-weight:600; }
  .option-body p { margin:0; font-size:13px; color:var(--ink-dim); }

  .option-chevron { color:var(--ink-faint); flex-shrink:0; }
  .option-chevron svg { width:18px; height:18px; }

  .loading-note { text-align:center; color:var(--ink-faint); font-size:12.5px; padding-bottom:8px; }
</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <a class="icon-btn" href="classroom-dashboard.html" aria-label="Back to dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </a>
    <h1 id="pageTitle">Subject</h1>
  </header>

  <div class="subject-hero">
    <div class="icon" id="subjectIcon">📘</div>
    <h2 id="subjectName">Subject</h2>
    <p id="subjectSub">Choose how you'd like to study</p>
  </div>

  <div class="options">
    <a class="option-card" id="testOption">
      <div class="option-glyph">📝</div>
      <div class="option-body">
        <h3>Take CBT Test</h3>
        <p id="questionCount">Loading questions…</p>
      </div>
      <div class="option-chevron">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </a>

    <a class="option-card" id="notesOption">
      <div class="option-glyph">📖</div>
      <div class="option-body">
        <h3>Study Notes</h3>
        <p id="notesCount">Loading notes…</p>
      </div>
      <div class="option-chevron">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </a>
  </div>

  <div class="loading-note" id="offlineNote" hidden>You're offline — counts may be out of date.</div>
</div>

<script>
  const subjects = SUBJECTS; // from subjects.js

  const params = new URLSearchParams(window.location.search);
  const subjectId = params.get("id");
  const subject = subjects.find(s => s.id === subjectId);

  registerServiceWorker();

  (async () => {
    const user = await requireUser();
    if (!user) return;

    if (!subject) {
      window.location.href = "classroom-dashboard.html";
      return;
    }

    document.getElementById("pageTitle").textContent = subject.name;
    document.getElementById("subjectIcon").textContent = subject.icon;
    document.getElementById("subjectName").textContent = subject.name;
    document.getElementById("testOption").href = `test-select.html?id=${encodeURIComponent(subject.id)}`;
    document.getElementById("notesOption").href = `notes.html?id=${encodeURIComponent(subject.id)}`;

    if (!navigator.onLine) {
      document.getElementById("offlineNote").hidden = false;
    }

    const [{ count: qCount, error: qErr }, { count: nCount, error: nErr }] = await Promise.all([
      supabaseClient.from("questions").select("id", { count: "exact", head: true }).eq("subject_id", subject.id),
      supabaseClient.from("notes").select("id", { count: "exact", head: true }).eq("subject_id", subject.id)
    ]);

    document.getElementById("questionCount").textContent = qErr
      ? "Tap to try again"
      : `${qCount || 0} question${qCount === 1 ? "" : "s"} available`;

    document.getElementById("notesCount").textContent = nErr
      ? "Tap to try again"
      : `${nCount || 0} note${nCount === 1 ? "" : "s"} available`;
  })();
</script>

</body>
</html>
