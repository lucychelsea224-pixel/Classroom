<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Study Plan · Classroom</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2d2d2d">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="offline-store.js"></script>
<style>
  :root{
    --bg: #2d2d2d; --card: #3d3d3d; --card-2: #464646; --badge: #262626; --border: #4a4a4a;
    --ink: #f4f2ee; --ink-dim: #b7b3ab; --ink-faint: #857f75;
    --accent-green: #2f5c34; --accent-green-bright: #4c8a52;
    --danger: #c65b5b; --radius: 12px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    -webkit-font-smoothing: antialiased; min-height:100vh; }
  a { color:inherit; text-decoration:none; }
  button, select, input { font-family: inherit; }

  .app { max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }

  .topbar { display:flex; align-items:center; gap:14px; padding:14px 16px;
    padding-top:max(14px, env(safe-area-inset-top)); position:sticky; top:0; background:var(--bg); z-index:5; }
  .icon-btn { background:none; border:none; color:var(--ink); padding:4px; display:flex;
    align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .icon-btn svg { width:22px; height:22px; }
  .topbar h1 { flex:1; font-size:19px; font-weight:600; margin:0; }

  main { flex:1; padding:8px 16px 40px; }

  .create-btn {
    display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
    background:var(--accent-green); color:#eaf5ea; border:2px solid var(--accent-green-bright);
    border-radius:999px; padding:13px; font-size:15px; font-weight:700; cursor:pointer; margin-bottom:24px;
  }
  .create-btn svg { width:18px; height:18px; }

  /* ---- Calendar ---- */
  .cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .cal-header h2 { font-size:17px; font-weight:700; margin:0; }
  .cal-nav { display:flex; gap:8px; }
  .cal-nav button {
    width:34px; height:34px; border-radius:50%; background:var(--card-2); border:1px solid var(--border);
    color:var(--ink); display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .cal-nav svg { width:17px; height:17px; }

  .cal-weekdays { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:6px; }
  .cal-weekdays span { text-align:center; font-size:11.5px; color:var(--ink-faint); font-weight:600; }

  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .cal-cell {
    aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    border-radius:9px; background:var(--card-2); color:var(--ink); font-size:13px; font-weight:600;
    cursor:pointer; position:relative; border:2px solid transparent;
  }
  .cal-cell.empty { background:none; cursor:default; }
  .cal-cell.today { border-color:var(--accent-green-bright); }
  .cal-cell.selected { background:#2563a8; }
  .cal-cell .dot { width:5px; height:5px; border-radius:50%; background:var(--accent-green-bright); margin-top:3px; }
  .cal-cell.selected .dot { background:#eaf5ea; }

  /* ---- Day detail ---- */
  .day-detail { margin-top:26px; }
  .day-detail h3 { font-size:15.5px; font-weight:700; margin:0 0 12px; }
  .session-card {
    background:var(--card); border:1px solid var(--accent-green-bright); border-radius:var(--radius);
    padding:18px; display:flex; align-items:center; gap:14px;
  }
  .session-card .glyph {
    width:48px; height:48px; border-radius:12px; background:rgba(76,138,82,0.16);
    display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0;
  }
  .session-card .info { flex:1; min-width:0; }
  .session-card h4 { margin:0 0 3px; font-size:15px; font-weight:700; }
  .session-card p { margin:0; font-size:12.5px; color:var(--ink-dim); }
  .session-actions { display:flex; gap:8px; margin-top:14px; }
  .session-actions a {
    flex:1; text-align:center; padding:11px; border-radius:9px; font-size:13.5px; font-weight:600;
  }
  .session-actions .primary { background:var(--accent-green); color:#eaf5ea; }
  .session-actions .ghost { background:var(--card-2); color:var(--ink-dim); }

  .no-session {
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    padding:20px; text-align:center; color:var(--ink-faint); font-size:13.5px;
  }

  .change-subject-btn {
    display:block; width:100%; margin-top:12px; background:var(--card-2); border:1px solid var(--border);
    color:var(--accent-green-bright); border-radius:9px; padding:12px; font-size:13.5px; font-weight:600; cursor:pointer;
  }

  .subject-pick-list { display:flex; flex-direction:column; gap:8px; }
  .subject-pick-row {
    display:flex; align-items:center; gap:12px; width:100%; text-align:left;
    background:var(--card-2); border:1px solid var(--border); border-radius:10px;
    padding:13px 14px; color:var(--ink); font-size:14.5px; font-weight:600; cursor:pointer;
  }
  .subject-pick-row.active { border-color:var(--accent-green-bright); background:rgba(76,138,82,0.14); }
  .subject-pick-row .glyph { font-size:19px; }
  .subject-pick-row.clear { color:var(--danger); margin-top:4px; }

  /* ---- Empty state (no plan yet) ---- */
  .empty-state { text-align:center; padding:60px 20px; color:var(--ink-faint); }
  .empty-state .glyph { font-size:44px; margin-bottom:14px; }
  .empty-state h2 { font-size:17px; color:var(--ink); margin-bottom:8px; }
  .empty-state p { font-size:13.5px; line-height:1.6; margin-bottom:22px; }

  /* ---- Modal ---- */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:50;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .modal-overlay.hidden { display:none; }
  .modal-sheet {
    background:var(--bg); width:100%; max-width:480px; border-radius:20px 20px 0 0;
    padding:22px 20px calc(24px + env(safe-area-inset-bottom)); max-height:88vh; overflow-y:auto;
  }
  .modal-sheet h2 { font-size:18px; font-weight:700; margin:0 0 18px; }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:12.5px; font-weight:600; color:var(--ink-dim);
    text-transform:uppercase; letter-spacing:0.03em; margin-bottom:7px; }
  .field input[type="date"] {
    width:100%; background:var(--card-2); border:1px solid var(--border); border-radius:10px;
    padding:12px 13px; color:var(--ink); font-size:15px; color-scheme:dark;
  }
  .day-toggles { display:flex; flex-wrap:wrap; gap:8px; }
  .day-toggle {
    padding:9px 13px; border-radius:999px; background:var(--card-2); border:1px solid var(--border);
    color:var(--ink-dim); font-size:12.5px; font-weight:600; cursor:pointer;
  }
  .day-toggle.active { background:var(--accent-green); border-color:var(--accent-green); color:#eaf5ea; }

  .excluded-list { display:flex; flex-direction:column; gap:8px; margin-bottom:10px; }
  .excluded-row { display:flex; align-items:center; gap:8px; }
  .excluded-row input[type="date"] { flex:1; }
  .excluded-row button {
    background:var(--card-2); border:1px solid var(--border); color:var(--danger);
    width:38px; height:38px; border-radius:8px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  }
  .add-exclude-btn {
    display:flex; align-items:center; gap:6px; background:var(--card-2); border:1px solid var(--border);
    color:var(--ink); border-radius:9px; padding:9px 14px; font-size:13px; font-weight:600; margin-bottom:8px;
  }

  .modal-actions { display:flex; gap:10px; margin-top:22px; }
  .modal-actions button { flex:1; border:none; border-radius:10px; padding:14px; font-size:15px; font-weight:600; cursor:pointer; }
  .btn-cancel { background:var(--card-2); color:var(--ink-dim); }
  .btn-create { background:var(--accent-green); color:#eaf5ea; }

  .menu-overlay { position:fixed; inset:0; z-index:40; display:none; }
  .menu-overlay.open { display:block; }
  .menu-sheet {
    position:absolute; top:56px; right:16px; background:var(--card); border:1px solid var(--border);
    border-radius:12px; overflow:hidden; min-width:160px;
  }
  .menu-sheet button {
    display:block; width:100%; text-align:left; background:none; border:none; color:var(--ink);
    padding:13px 16px; font-size:14px; cursor:pointer;
  }
  .menu-sheet button.danger { color:var(--danger); }
</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <a class="icon-btn" href="classroom-dashboard.html" aria-label="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </a>
    <h1>Study Plan</h1>
    <button class="icon-btn" id="menuBtn" aria-label="More options">
      <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="12" cy="19" r="1.8"/></svg>
    </button>
  </header>

  <main id="mainArea"></main>
</div>

<div class="menu-overlay" id="menuOverlay">
  <div class="menu-sheet">
    <button id="editPlanBtn">Edit Study Plan</button>
    <button class="danger" id="deletePlanBtn">Delete Plan</button>
  </div>
</div>

<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal-sheet">
    <h2>Create Study Plan</h2>
    <div class="field">
      <label for="startDate">Start Date</label>
      <input type="date" id="startDate">
    </div>
    <div class="field">
      <label for="endDate">End Date</label>
      <input type="date" id="endDate">
    </div>
    <div class="field">
      <label>Select Study Days</label>
      <div class="day-toggles" id="dayToggles"></div>
    </div>
    <div class="field">
      <label>Days to Exclude (holidays, etc.)</label>
      <div class="excluded-list" id="excludedList"></div>
      <button type="button" class="add-exclude-btn" id="addExcludeBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="14" height="14"><path d="M12 5v14M5 12h14"/></svg>
        Add date
      </button>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelModalBtn">Cancel</button>
      <button class="btn-create" id="createPlanBtn">Create</button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="subjectPickerOverlay">
  <div class="modal-sheet" id="subjectPickerSheet"></div>
</div>

<script>
  const SUBJECTS = [
    { id: "civic-ed",       name: "Civic Education", icon: "⚖️" },
    { id: "english",        name: "English",         icon: "📖" },
    { id: "ict",            name: "ICT",             icon: "🌐" },
    { id: "mathematics",    name: "Mathematics",     icon: "🧮" },
    { id: "science",        name: "Science",         icon: "🧠" },
    { id: "social-studies", name: "Social Studies",  icon: "🏠" }
  ];
  const WEEKDAY_LABELS = ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"];
  const MONTH_LABELS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  registerServiceWorker();

  function fmtDate(d) {
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
  }
  function parseDate(str) {
    const [y, m, d] = str.split("-").map(Number);
    return new Date(y, m - 1, d);
  }

  let currentUser = null;
  let currentPlan = null;       // row from study_plans, or null
  let schedule = {};             // dateStr -> subject object
  let viewMonth = new Date();    // month currently shown in the calendar
  let selectedDate = fmtDate(new Date());
  let excludeInputCount = 0;
  let selectedDays = new Set([0,1,2,3,4,5,6]);

  // ---- Schedule generation: rotates through subjects on each study day,
  // then applies any manual per-day overrides on top ----
  function generateSchedule(plan) {
    const start = parseDate(plan.start_date);
    const end = parseDate(plan.end_date);
    const studyDays = new Set(plan.study_days);
    const excluded = new Set(plan.excluded_dates);
    const sched = {};
    let idx = 0;
    const d = new Date(start);
    while (d <= end) {
      const dateStr = fmtDate(d);
      if (studyDays.has(d.getDay()) && !excluded.has(dateStr)) {
        sched[dateStr] = SUBJECTS[idx % SUBJECTS.length];
        idx++;
      }
      d.setDate(d.getDate() + 1);
    }

    const overrides = plan.overrides || {};
    Object.keys(overrides).forEach((dateStr) => {
      const value = overrides[dateStr];
      if (value === "none") {
        delete sched[dateStr];
      } else {
        const subject = SUBJECTS.find((s) => s.id === value);
        if (subject) sched[dateStr] = subject;
      }
    });

    return sched;
  }

  // ---- Calendar rendering ----
  function renderCalendarPage() {
    document.getElementById("mainArea").innerHTML = `
      <button class="create-btn" id="createBtnTop">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        ${currentPlan ? "Recreate Study Plan" : "Create Study Plan"}
      </button>
      <div class="cal-header">
        <h2 id="calMonthLabel"></h2>
        <div class="cal-nav">
          <button id="prevMonthBtn" aria-label="Previous month"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
          <button id="nextMonthBtn" aria-label="Next month"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
        </div>
      </div>
      <div class="cal-weekdays">${WEEKDAY_LABELS.map(d => `<span>${d}</span>`).join("")}</div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="day-detail" id="dayDetail"></div>
    `;
    document.getElementById("createBtnTop").addEventListener("click", openModal);
    document.getElementById("prevMonthBtn").addEventListener("click", () => { viewMonth.setMonth(viewMonth.getMonth() - 1); renderMonth(); });
    document.getElementById("nextMonthBtn").addEventListener("click", () => { viewMonth.setMonth(viewMonth.getMonth() + 1); renderMonth(); });
    renderMonth();
  }

  function renderMonth() {
    document.getElementById("calMonthLabel").textContent = `${MONTH_LABELS[viewMonth.getMonth()]} ${viewMonth.getFullYear()}`;
    const grid = document.getElementById("calGrid");
    const year = viewMonth.getFullYear(), month = viewMonth.getMonth();
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const todayStr = fmtDate(new Date());

    let html = "";
    for (let i = 0; i < firstDay; i++) html += `<div class="cal-cell empty"></div>`;
    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = fmtDate(new Date(year, month, day));
      const hasSession = !!schedule[dateStr];
      const cls = ["cal-cell", dateStr === todayStr ? "today" : "", dateStr === selectedDate ? "selected" : ""].filter(Boolean).join(" ");
      html += `<div class="${cls}" data-date="${dateStr}">${day}${hasSession ? '<span class="dot"></span>' : ""}</div>`;
    }
    grid.innerHTML = html;

    grid.querySelectorAll("[data-date]").forEach(cell => {
      cell.addEventListener("click", () => { selectedDate = cell.dataset.date; renderMonth(); renderDayDetail(); });
    });
    renderDayDetail();
  }

  function renderDayDetail() {
    const d = parseDate(selectedDate);
    const label = d.toLocaleDateString("en-US", { weekday: "long", day: "numeric", month: "long" });
    const session = schedule[selectedDate];
    const detail = document.getElementById("dayDetail");
    const inPlanRange = currentPlan && selectedDate >= currentPlan.start_date && selectedDate <= currentPlan.end_date;

    if (!session) {
      detail.innerHTML = `
        <h3>${label}</h3>
        <div class="no-session">No study session scheduled${currentPlan ? "" : " — create a study plan to get started"}.</div>
        ${inPlanRange ? `<button class="change-subject-btn" id="pickSubjectBtn">+ Assign a subject to this day</button>` : ""}
      `;
    } else {
      detail.innerHTML = `
        <h3>${label}</h3>
        <div class="session-card">
          <div class="glyph">${session.icon}</div>
          <div class="info">
            <h4>${session.name}</h4>
            <p>Review notes, then take a practice test</p>
          </div>
        </div>
        <div class="session-actions">
          <a class="ghost" href="notes.html?id=${session.id}">Study Notes</a>
          <a class="primary" href="test-select.html?id=${session.id}">Take Test</a>
        </div>
        ${inPlanRange ? `<button class="change-subject-btn" id="pickSubjectBtn">Change subject for this day</button>` : ""}
      `;
    }

    const pickBtn = document.getElementById("pickSubjectBtn");
    if (pickBtn) pickBtn.addEventListener("click", openSubjectPicker);
  }

  // ---- Manual per-day override ----
  function openSubjectPicker() {
    const session = schedule[selectedDate];
    const sheet = document.getElementById("subjectPickerSheet");
    sheet.innerHTML = `
      <h2>Assign a subject</h2>
      <div class="subject-pick-list">
        ${SUBJECTS.map(s => `
          <button class="subject-pick-row ${session?.id === s.id ? "active" : ""}" data-subject="${s.id}">
            <span class="glyph">${s.icon}</span> ${s.name}
          </button>
        `).join("")}
        ${session ? `<button class="subject-pick-row clear" data-subject="none">✕ No session this day</button>` : ""}
      </div>
      <button class="btn-cancel" id="cancelPickerBtn" style="width:100%; margin-top:14px;">Cancel</button>
    `;
    sheet.querySelectorAll("[data-subject]").forEach(btn => {
      btn.addEventListener("click", () => saveOverride(btn.dataset.subject));
    });
    document.getElementById("cancelPickerBtn").addEventListener("click", closeSubjectPicker);
    document.getElementById("subjectPickerOverlay").classList.remove("hidden");
  }
  function closeSubjectPicker() {
    document.getElementById("subjectPickerOverlay").classList.add("hidden");
  }

  async function saveOverride(value) {
    const overrides = { ...(currentPlan.overrides || {}) };
    overrides[selectedDate] = value;

    const { data, error } = await supabaseClient
      .from("study_plans")
      .update({ overrides, updated_at: new Date().toISOString() })
      .eq("user_id", currentUser.id)
      .select()
      .single();

    closeSubjectPicker();
    if (error) { alert("Couldn't save that change: " + error.message); return; }

    currentPlan = data;
    schedule = generateSchedule(currentPlan);
    renderMonth();
  }

  // ---- Empty state (no plan yet) ----
  function renderEmptyState() {
    document.getElementById("mainArea").innerHTML = `
      <div class="empty-state">
        <div class="glyph">🗓️</div>
        <h2>No study plan yet</h2>
        <p>Set a start date, end date, and which days you want to study — we'll spread all six subjects across your calendar automatically.</p>
      </div>
      <button class="create-btn" id="createBtnEmpty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Create Study Plan
      </button>
    `;
    document.getElementById("createBtnEmpty").addEventListener("click", openModal);
  }

  function render() {
    if (currentPlan) renderCalendarPage();
    else renderEmptyState();
  }

  // ---- Modal ----
  function openModal() {
    const today = fmtDate(new Date());
    const eightWeeks = new Date(); eightWeeks.setDate(eightWeeks.getDate() + 56);

    document.getElementById("startDate").value = currentPlan?.start_date || today;
    document.getElementById("endDate").value = currentPlan?.end_date || fmtDate(eightWeeks);
    selectedDays = new Set(currentPlan?.study_days ?? [0,1,2,3,4,5,6]);
    renderDayToggles();

    const excludedList = document.getElementById("excludedList");
    excludedList.innerHTML = "";
    excludeInputCount = 0;
    (currentPlan?.excluded_dates || []).forEach(d => addExcludeRow(d));

    document.getElementById("modalOverlay").classList.remove("hidden");
  }
  function closeModal() {
    document.getElementById("modalOverlay").classList.add("hidden");
  }

  function renderDayToggles() {
    const labels = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    document.getElementById("dayToggles").innerHTML = labels.map((l, i) => `
      <button type="button" class="day-toggle ${selectedDays.has(i) ? "active" : ""}" data-day="${i}">${l}</button>
    `).join("");
    document.querySelectorAll(".day-toggle").forEach(btn => {
      btn.addEventListener("click", () => {
        const day = parseInt(btn.dataset.day, 10);
        if (selectedDays.has(day)) selectedDays.delete(day); else selectedDays.add(day);
        renderDayToggles();
      });
    });
  }

  function addExcludeRow(value) {
    excludeInputCount++;
    const row = document.createElement("div");
    row.className = "excluded-row";
    row.innerHTML = `
      <input type="date" value="${value || ""}">
      <button type="button" aria-label="Remove"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    `;
    row.querySelector("button").addEventListener("click", () => row.remove());
    document.getElementById("excludedList").appendChild(row);
  }

  async function createPlan() {
    const createBtn = document.getElementById("createPlanBtn");
    const startDate = document.getElementById("startDate").value;
    const endDate = document.getElementById("endDate").value;

    if (!startDate || !endDate) { alert("Please choose a start and end date."); return; }
    if (endDate < startDate) { alert("End date must be after the start date."); return; }
    if (!selectedDays.size) { alert("Select at least one study day."); return; }

    const excludedDates = Array.from(document.querySelectorAll("#excludedList input"))
      .map(i => i.value).filter(Boolean);

    createBtn.disabled = true; createBtn.textContent = "Creating…";

    const payload = {
      user_id: currentUser.id,
      start_date: startDate,
      end_date: endDate,
      study_days: Array.from(selectedDays),
      excluded_dates: excludedDates,
      updated_at: new Date().toISOString()
    };

    const { data, error } = await supabaseClient.from("study_plans").upsert(payload, { onConflict: "user_id" }).select().single();
    createBtn.disabled = false; createBtn.textContent = "Create";

    if (error) { alert("Couldn't save your study plan: " + error.message); return; }

    currentPlan = data;
    schedule = generateSchedule(currentPlan);
    viewMonth = parseDate(currentPlan.start_date);
    selectedDate = currentPlan.start_date;
    closeModal();
    render();
  }

  async function deletePlan() {
    if (!confirm("Delete your study plan? This can't be undone.")) return;
    await supabaseClient.from("study_plans").delete().eq("user_id", currentUser.id);
    currentPlan = null;
    schedule = {};
    render();
  }

  // ---- Events ----
  document.getElementById("cancelModalBtn").addEventListener("click", closeModal);
  document.getElementById("createPlanBtn").addEventListener("click", createPlan);
  document.getElementById("addExcludeBtn").addEventListener("click", () => addExcludeRow());
  document.getElementById("modalOverlay").addEventListener("click", (e) => {
    if (e.target.id === "modalOverlay") closeModal();
  });
  document.getElementById("subjectPickerOverlay").addEventListener("click", (e) => {
    if (e.target.id === "subjectPickerOverlay") closeSubjectPicker();
  });

  const menuOverlay = document.getElementById("menuOverlay");
  document.getElementById("menuBtn").addEventListener("click", () => menuOverlay.classList.toggle("open"));
  menuOverlay.addEventListener("click", (e) => { if (e.target === menuOverlay) menuOverlay.classList.remove("open"); });
  document.getElementById("editPlanBtn").addEventListener("click", () => { menuOverlay.classList.remove("open"); openModal(); });
  document.getElementById("deletePlanBtn").addEventListener("click", () => { menuOverlay.classList.remove("open"); deletePlan(); });

  // ---- Load ----
  (async () => {
    const user = await requireUser();
    if (!user) return;
    currentUser = user;

    const { data, error } = await supabaseClient.from("study_plans").select("*").eq("user_id", user.id).maybeSingle();
    if (!error && data) {
      currentPlan = data;
      schedule = generateSchedule(currentPlan);
      viewMonth = parseDate(currentPlan.start_date);
      selectedDate = fmtDate(new Date()) >= currentPlan.start_date && fmtDate(new Date()) <= currentPlan.end_date
        ? fmtDate(new Date())
        : currentPlan.start_date;
    }
    render();
  })();
</script>

</body>
</html>
