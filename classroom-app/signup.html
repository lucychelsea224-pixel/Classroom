<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sign Up · Classroom</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2d2d2d">
<style>
  :root{
    --bg: #2d2d2d; --card: #3d3d3d; --card-2: #464646; --border: #4a4a4a;
    --ink: #f4f2ee; --ink-dim: #b7b3ab; --accent-green: #2f5c34;
    --accent-green-bright: #4c8a52; --danger: #e08080; --success: #7bd88f; --radius: 12px;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    min-height:100vh; }
  .wrap { max-width:400px; margin:0 auto; min-height:100vh; display:flex;
    flex-direction:column; justify-content:center; padding:32px 24px; }
  .brand { text-align:center; margin-bottom:36px; }
  .brand .glyph { font-size:34px; margin-bottom:10px; }
  .brand h1 { font-size:22px; font-weight:700; margin:0; }
  .brand p { color:var(--ink-dim); font-size:13.5px; margin:6px 0 0; }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:12.5px; font-weight:600; color:var(--ink-dim);
    text-transform:uppercase; letter-spacing:0.03em; margin-bottom:7px; }
  .field input { width:100%; background:var(--card-2); border:1px solid var(--border);
    border-radius:10px; padding:13px; color:var(--ink); font-size:15px; font-family:inherit; }
  .field input:focus { outline:none; border-color:var(--accent-green-bright); }
  .hint { font-size:12px; color:var(--ink-dim); margin:-8px 0 14px; }
  .error { color:var(--danger); font-size:13px; margin:-6px 0 14px; min-height:16px; }
  .success-box { text-align:center; padding:20px; background:var(--card);
    border:1px solid var(--border); border-radius:var(--radius); }
  .success-box .glyph { font-size:32px; margin-bottom:10px; }
  .success-box p { color:var(--ink-dim); font-size:14px; margin:6px 0 0; }
  .btn-primary { width:100%; background:var(--accent-green); color:#eaf5ea; border:none;
    border-radius:10px; padding:14px; font-size:15.5px; font-weight:600; cursor:pointer; margin-top:6px; }
  .btn-primary:disabled { opacity:0.6; }
  .switch { text-align:center; margin-top:20px; font-size:13.5px; color:var(--ink-dim); }
  .switch a { color:var(--accent-green-bright); font-weight:600; text-decoration:none; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="glyph">🎓</div>
      <h1>Create your account</h1>
      <p>Start tracking your study progress</p>
    </div>

    <form id="signupForm">
      <div class="field">
        <label for="fullName">Full name</label>
        <input type="text" id="fullName" placeholder="e.g. Ade Bello" required autocomplete="name">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required minlength="6" autocomplete="new-password">
      </div>
      <div class="hint">At least 6 characters</div>
      <div class="error" id="errorMsg"></div>
      <button type="submit" class="btn-primary" id="submitBtn">Sign Up</button>
    </form>

    <div id="successBox" class="success-box" style="display:none;">
      <div class="glyph">📬</div>
      <strong>Check your email</strong>
      <p>We've sent a confirmation link to finish setting up your account.</p>
    </div>

    <div class="switch">Already have an account? <a href="login.html">Log in</a></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="offline-store.js"></script>
  <script>
    registerServiceWorker();

    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const fullName = document.getElementById("fullName").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errorMsg = document.getElementById("errorMsg");
      const submitBtn = document.getElementById("submitBtn");

      errorMsg.textContent = "";
      submitBtn.disabled = true;
      submitBtn.textContent = "Creating account…";

      const { data, error } = await supabaseClient.auth.signUp({
        email,
        password,
        options: { data: { full_name: fullName } }
      });

      if (error) {
        errorMsg.textContent = error.message;
        submitBtn.disabled = false;
        submitBtn.textContent = "Sign Up";
        return;
      }

      // If your Supabase project has email confirmation OFF, there will
      // already be a session here and we can go straight to the app.
      if (data.session) {
        window.location.href = "classroom-dashboard.html";
        return;
      }

      document.getElementById("signupForm").style.display = "none";
      document.getElementById("successBox").style.display = "block";
    });
  </script>
</body>
</html>
