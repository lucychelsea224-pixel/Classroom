<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CBT Test · Classroom</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2d2d2d">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="offline-store.js"></script>
<script src="subjects.js"></script>
<style>
  :root{
    --bg: #2d2d2d; --card: #3d3d3d; --card-2: #464646; --border: #4a4a4a;
    --ink: #f4f2ee; --ink-dim: #b7b3ab; --ink-faint: #857f75;
    --accent-green: #2f5c34; --accent-green-bright: #4c8a52;
    --danger: #c65b5b; --danger-bg: rgba(198,91,91,0.16);
    --success-bg: rgba(76,138,82,0.18); --radius: 12px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    -webkit-font-smoothing: antialiased; min-height:100vh; }
  a { color:inherit; text-decoration:none; }
  button { font-family: inherit; }

  .app { max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }

  .topbar { display:flex; align-items:center; gap:14px; padding:14px 16px;
    padding-top:max(14px, env(safe-area-inset-top)); position:sticky; top:0; background:var(--bg); z-index:5; }
  .icon-btn { background:none; border:none; color:var(--ink); padding:4px; display:flex;
    align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .icon-btn svg { width:22px; height:22px; }
  .topbar h1 { flex:1; font-size:18px; font-weight:600; margin:0; letter-spacing:-0.01em; }
  .progress-text { font-size:13px; color:var(--ink-dim); font-weight:600; flex-shrink:0; }

  .progress-track { height:4px; background:var(--card-2); margin:0 16px 4px; border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--accent-green-bright); transition:width 0.25s ease; }

  .dot-nav { display:flex; gap:6px; padding:12px 16px; overflow-x:auto; scrollbar-width:none; }
  .dot-nav::-webkit-scrollbar { display:none; }
  .dot-nav button {
    flex-shrink:0; width:32px; height:32px; border-radius:8px; border:1px solid var(--border);
    background:var(--card); color:var(--ink-dim); font-size:12.5px; font-weight:600; cursor:pointer;
  }
  .dot-nav button.current { border-color:var(--accent-green-bright); color:var(--ink); }
  .dot-nav button.answered { background:var(--accent-green); border-color:var(--accent-green); color:#eaf5ea; }

  main { flex:1; padding:8px 16px 16px; display:flex; flex-direction:column; }

  .question-card {
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    padding:18px; margin-bottom:16px;
  }
  .question-card h2 { font-size:16.5px; font-weight:600; line-height:1.45; margin:0; }
  .question-image {
    display:block; max-width:100%; max-height:220px; margin:0 auto 14px; border-radius:10px;
    background:#fff; object-fit:contain;
  }
  .option-image {
    display:block; max-width:100%; max-height:90px; margin-bottom:8px; border-radius:8px;
    background:#fff; object-fit:contain;
  }

  .option-list { display:flex; flex-direction:column; gap:10px; }
  .option-row {
    display:flex; align-items:center; gap:12px; background:var(--card);
    border:1px solid var(--border); border-radius:10px; padding:13px 14px; cursor:pointer;
  }
  .option-row .letter {
    width:26px; height:26px; border-radius:7px; background:var(--card-2); color:var(--ink-dim);
    font-size:12.5px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .option-row .text { flex:1; font-size:14.5px; }
  .option-row.selected { border-color:var(--accent-green-bright); background:rgba(76,138,82,0.12); }
  .option-row.selected .letter { background:var(--accent-green); color:#eaf5ea; }

  .nav-footer { display:flex; gap:10px; margin-top:auto; padding-top:16px; }
  .btn { flex:1; border:none; border-radius:10px; padding:14px; font-size:15px; font-weight:600; cursor:pointer; }
  .btn-ghost { background:var(--card-2); color:var(--ink-dim); }
  .btn-primary { background:var(--accent-green); color:#eaf5ea; }
  .btn:disabled { opacity:0.5; cursor:default; }

  /* ---- Results ---- */
  .score-card {
    text-align:center; background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    padding:28px 20px; margin:8px 16px 20px;
  }
  .score-card .big { font-size:38px; font-weight:700; margin:6px 0 2px; }
  .score-card .sub { font-size:13.5px; color:var(--ink-dim); }

  .review-item {
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px; margin:0 16px 12px;
  }
  .review-item h3 { font-size:14.5px; font-weight:600; margin:0 0 12px; line-height:1.45; }
  .review-option {
    display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:9px; margin-bottom:8px;
    font-size:13.5px; border:1px solid var(--border);
  }
  .review-option.correct { background:var(--success-bg); border-color:var(--accent-green-bright); }
  .review-option.incorrect { background:var(--danger-bg); border-color:var(--danger); }
  .review-option .mark { width:18px; flex-shrink:0; text-align:center; }
  .explanation {
    margin-top:10px; padding:12px; background:var(--card-2); border-radius:9px;
    font-size:13px; color:var(--ink-dim); line-height:1.5;
  }
  .explanation strong { color:var(--ink); font-weight:700; }
  .explanation em { font-style:italic; }

  #mainArea { -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none; user-select:none; }

  .results-actions { display:flex; gap:10px; padding:8px 16px 32px; }

  .empty-state { text-align:center; padding:56px 20px; color:var(--ink-faint); flex:1; }
  .empty-state .glyph { font-size:36px; margin-bottom:12px; }
  .empty-state p { margin:0 0 18px; font-size:14px; }
</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <a class="icon-btn" id="backBtn" href="classroom-dashboard.html" aria-label="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </a>
    <h1 id="pageTitle">CBT Test</h1>
    <span class="progress-text" id="progressText"></span>
  </header>

  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="dot-nav" id="dotNav"></div>

  <main id="mainArea"></main>
</div>

<script>
  const subjects = SUBJECTS; // from subjects.js

  const LETTERS = ["A", "B", "C", "D", "E", "F"];
  const params = new URLSearchParams(window.location.search);
  const subjectId = params.get("id");
  const subject = subjects.find(s => s.id === subjectId);
  let testNumber = parseInt(params.get("test"), 10) || null;
  const reviewMode = !!params.get("ids");

  registerServiceWorker();

  const state = {
    questions: [],
    currentIndex: 0,
    answers: {},   // { questionId: selectedOptionIndex }
    mode: "loading" // 'loading' | 'taking' | 'results'
  };

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }

  // Lightweight formatting: **bold**, *italic*, "- " bullets.
  // Text is escaped first so nothing typed into a question/explanation
  // can inject HTML.
  function renderFormatted(str) {
    let safe = escapeHtml(str);
    safe = safe.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    safe = safe.replace(/\*(.+?)\*/g, "<em>$1</em>");
    safe = safe.replace(/(^|\n)- (.+)/g, "$1• $2");
    return safe;
  }

  // Basic copy deterrents. Note: nothing rendered in a browser can be made
  // 100% uncopyable — a determined person can still use dev tools or a
  // screenshot. This just removes the easy, casual ways to lift content.
  document.addEventListener("contextmenu", (e) => {
    if (e.target.closest("#mainArea")) e.preventDefault();
  });
  document.addEventListener("copy", (e) => {
    if (window.getSelection().anchorNode && document.getElementById("mainArea")?.contains(window.getSelection().anchorNode)) {
      e.preventDefault();
    }
  });

  // ---- Header progress bar + dot navigator ----
  function renderProgress() {
    const total = state.questions.length;
    const answered = Object.keys(state.answers).length;

    document.getElementById("progressText").textContent =
      state.mode === "taking" ? `${state.currentIndex + 1} / ${total}` : "";
    document.getElementById("progressFill").style.width =
      total ? `${(answered / total) * 100}%` : "0%";

    const dotNav = document.getElementById("dotNav");
    if (state.mode !== "taking" || !total) { dotNav.innerHTML = ""; return; }
    dotNav.innerHTML = state.questions.map((q, i) => {
      const cls = ["", i === state.currentIndex ? "current" : "", state.answers[q.id] !== undefined ? "answered" : ""]
        .filter(Boolean).join(" ");
      return `<button class="${cls}" data-goto="${i}">${i + 1}</button>`;
    }).join("");
  }

  // ---- Taking a question ----
  function renderQuestion() {
    const q = state.questions[state.currentIndex];
    const selected = state.answers[q.id];
    const isLast = state.currentIndex === state.questions.length - 1;

    document.getElementById("mainArea").innerHTML = `
      <div class="question-card">
        ${q.image_url ? `<img src="${q.image_url}" alt="" class="question-image">` : ""}
        <h2>${escapeHtml(q.question)}</h2>
      </div>
      <div class="option-list">
        ${q.options.map((opt, i) => {
          const optImg = q.option_images && q.option_images[i];
          return `
          <div class="option-row ${selected === i ? "selected" : ""}" data-select="${i}">
            <span class="letter">${LETTERS[i]}</span>
            ${optImg
              ? `<span class="text"><img src="${optImg}" alt="" class="option-image">${opt ? escapeHtml(opt) : ""}</span>`
              : `<span class="text">${escapeHtml(opt)}</span>`}
          </div>
        `;
        }).join("")}
      </div>
      <div class="nav-footer">
        <button class="btn btn-ghost" id="prevBtn" ${state.currentIndex === 0 ? "disabled" : ""}>Previous</button>
        ${isLast
          ? `<button class="btn btn-primary" id="submitBtn">Submit Test</button>`
          : `<button class="btn btn-primary" id="nextBtn">Next</button>`}
      </div>
    `;
  }

  function render() {
    renderProgress();
    if (state.mode === "loading") {
      document.getElementById("mainArea").innerHTML = `<div class="empty-state"><div class="glyph">⏳</div><p>Loading questions…</p></div>`;
    } else if (state.mode === "empty") {
      document.getElementById("mainArea").innerHTML = `
        <div class="empty-state">
          <div class="glyph">🧪</div>
          <p>No CBT questions have been added for ${escapeHtml(subject ? subject.name : "this subject")} yet.</p>
          <a class="btn btn-primary" href="subject.html?id=${encodeURIComponent(subjectId || "")}" style="display:inline-block;">Back to Subject</a>
        </div>`;
    } else if (state.mode === "taking") {
      renderQuestion();
    } else if (state.mode === "results") {
      renderResults();
    }
  }

  // ---- Grading + results ----
  function grade() {
    let correct = 0;
    state.questions.forEach(q => {
      if (state.answers[q.id] === q.correct_index) correct++;
    });
    return { correct, total: state.questions.length };
  }

  async function saveProgress(percent) {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) return;
    await supabaseClient.from("progress").upsert({
      user_id: session.user.id,
      subject_id: subjectId,
      percent,
      updated_at: new Date().toISOString()
    });
  }

  async function logAttempts() {
    try {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) return;
      const rows = state.questions.map(q => ({
        user_id: session.user.id,
        question_id: q.id,
        subject_id: subjectId,
        test_number: testNumber,
        selected_index: state.answers[q.id] ?? null,
        correct_index: q.correct_index,
        is_correct: state.answers[q.id] === q.correct_index
      }));
      await supabaseClient.from("quiz_attempts").insert(rows);
    } catch (err) {
      // Weak-areas tracking is a bonus feature — never let a logging
      // failure interrupt the student seeing their results.
      console.warn("Couldn't log quiz attempts:", err);
    }
  }

  async function sendScoreEmail(correct, total, percent) {
    try {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) return;
      await supabaseClient.functions.invoke("send-score-email", {
        body: {
          email: session.user.email,
          fullName: session.user.user_metadata?.full_name || "",
          subjectName: subject.name,
          testNumber,
          correct,
          total,
          percent
        }
      });
    } catch (err) {
      // Never block the results screen on an email failure — this is a
      // nice-to-have, not something that should get in a student's way.
      console.warn("Score email failed to send:", err);
    }
  }

  function renderResults() {
    const { correct, total } = grade();
    const percent = total ? Math.round((correct / total) * 100) : 0;

    const reviewHtml = state.questions.map((q, i) => {
      const selected = state.answers[q.id];
      const isCorrect = selected === q.correct_index;
      return `
        <div class="review-item">
          <h3>${i + 1}. ${escapeHtml(q.question)}</h3>
          ${q.image_url ? `<img src="${q.image_url}" alt="" class="question-image" style="max-height:160px; margin-bottom:12px;">` : ""}
          ${q.options.map((opt, oi) => {
            let cls = "";
            let mark = "";
            if (oi === q.correct_index) { cls = "correct"; mark = "✓"; }
            else if (oi === selected) { cls = "incorrect"; mark = "✕"; }
            const optImg = q.option_images && q.option_images[oi];
            return `<div class="review-option ${cls}"><span class="mark">${mark}</span><span>${LETTERS[oi]}. ${optImg ? `<img src="${optImg}" alt="" style="max-height:60px; vertical-align:middle; border-radius:4px; margin-right:6px;">` : ""}${escapeHtml(opt)}</span></div>`;
          }).join("")}
          ${q.explanation ? `<div class="explanation"><strong>Why:</strong> ${renderFormatted(q.explanation)}</div>` : ""}
        </div>
      `;
    }).join("");

    document.getElementById("mainArea").innerHTML = `
      <div class="score-card">
        <div class="sub">Your score</div>
        <div class="big">${correct} / ${total}</div>
        <div class="sub">${percent}% correct</div>
      </div>
      ${reviewHtml}
      <div class="results-actions">
        <button class="btn btn-ghost" id="retakeBtn">Retake Test</button>
        <a class="btn btn-primary" href="subject.html?id=${encodeURIComponent(subjectId)}" style="text-align:center;">Back to Subject</a>
      </div>
    `;

    saveProgress(percent);
    if (!reviewMode) sendScoreEmail(correct, total, percent);
    logAttempts();
  }

  // ---- Events ----
  document.addEventListener("click", (e) => {
    const dot = e.target.closest("[data-goto]");
    if (dot) { state.currentIndex = parseInt(dot.dataset.goto, 10); render(); return; }

    const opt = e.target.closest("[data-select]");
    if (opt) {
      const q = state.questions[state.currentIndex];
      state.answers[q.id] = parseInt(opt.dataset.select, 10);
      render();
      return;
    }

    if (e.target.id === "prevBtn") { state.currentIndex--; render(); return; }
    if (e.target.id === "nextBtn") { state.currentIndex++; render(); return; }
    if (e.target.id === "submitBtn") { state.mode = "results"; render(); return; }
    if (e.target.id === "retakeBtn") {
      state.currentIndex = 0; state.answers = {}; state.mode = "taking"; render(); return;
    }
  });

  // ---- Load ----
  (async () => {
    const user = await requireUser();
    if (!user) return;

    if (!subject) { window.location.href = "classroom-dashboard.html"; return; }

    const reviewIds = params.get("ids");

    if (!testNumber && !reviewIds) {
      window.location.href = `test-select.html?id=${encodeURIComponent(subject.id)}`;
      return;
    }

    document.getElementById("pageTitle").textContent = reviewIds
      ? `${subject.name} · Review`
      : `${subject.name} · Test ${testNumber}`;
    document.getElementById("backBtn").href = reviewIds
      ? "weak-areas.html"
      : `test-select.html?id=${encodeURIComponent(subject.id)}`;

    let allQuestions = [];
    if (navigator.onLine) {
      const { data, error } = await supabaseClient
        .from("questions")
        .select("*")
        .eq("subject_id", subject.id);
      if (!error && data) {
        allQuestions = data;
        await offlineStore.cacheQuestions(subject.id, data);
      } else {
        allQuestions = (await offlineStore.getQuestions(subject.id)) || [];
      }
    } else {
      allQuestions = (await offlineStore.getQuestions(subject.id)) || [];
    }

    let questions;
    if (reviewIds) {
      const idSet = new Set(reviewIds.split(","));
      questions = allQuestions.filter(q => idSet.has(q.id));
    } else {
      questions = allQuestions.filter(q => (q.test_number || 1) === testNumber);
    }

    // Shuffle so repeat attempts don't show questions in the same order —
    // except for English, whose comprehension questions must stay in the
    // order they were written so they read together with their passage.
    if (subject.id !== "english") {
      for (let i = questions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [questions[i], questions[j]] = [questions[j], questions[i]];
      }
    }

    state.questions = questions;
    state.mode = questions.length ? "taking" : "empty";
    render();
  })();
</script>

</body>
</html>
