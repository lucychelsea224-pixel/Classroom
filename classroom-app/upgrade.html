<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Go Premium · Classroom</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2d2d2d">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="offline-store.js"></script>
<script src="https://js.paystack.co/v1/inline.js"></script>
<style>
  :root{
    --bg: #2d2d2d; --card: #3d3d3d; --card-2: #464646; --border: #4a4a4a;
    --ink: #f4f2ee; --ink-dim: #b7b3ab; --ink-faint: #857f75;
    --accent-green: #2f5c34; --accent-green-bright: #4c8a52;
    --danger: #e08080; --radius: 12px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    -webkit-font-smoothing: antialiased; min-height:100vh; }
  a { color:inherit; text-decoration:none; }
  button, select { font-family: inherit; }

  .app { max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }

  .topbar { display:flex; align-items:center; gap:14px; padding:14px 16px;
    padding-top:max(14px, env(safe-area-inset-top)); position:sticky; top:0; background:var(--bg); z-index:5; }
  .icon-btn { background:none; border:none; color:var(--ink); padding:4px; display:flex;
    align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .icon-btn svg { width:22px; height:22px; }
  .topbar h1 { flex:1; font-size:19px; font-weight:600; margin:0; }

  main { flex:1; padding:8px 16px 40px; }

  .hero { text-align:center; padding:16px 10px 26px; }
  .hero .glyph { font-size:44px; margin-bottom:10px; }
  .hero h2 { font-size:21px; font-weight:700; margin:0 0 8px; }
  .hero p { font-size:14px; color:var(--ink-dim); line-height:1.55; max-width:340px; margin:0 auto; }

  .plan-card {
    background:var(--card); border:1px solid var(--accent-green-bright); border-radius:var(--radius);
    padding:22px 20px; margin-bottom:18px;
  }
  .plan-price { font-size:34px; font-weight:800; margin-bottom:2px; }
  .plan-price span { font-size:14px; font-weight:500; color:var(--ink-dim); }
  .plan-sub { font-size:13px; color:var(--ink-dim); margin-bottom:16px; }
  .plan-features { list-style:none; padding:0; margin:0 0 18px; display:flex; flex-direction:column; gap:9px; }
  .plan-features li { display:flex; align-items:center; gap:9px; font-size:13.5px; color:var(--ink); }
  .plan-features svg { width:16px; height:16px; color:var(--accent-green-bright); flex-shrink:0; }

  .currency-row { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
  .currency-row label { font-size:12.5px; color:var(--ink-dim); font-weight:600; }
  .currency-row select {
    flex:1; background:var(--card-2); border:1px solid var(--border); border-radius:8px;
    padding:9px 10px; color:var(--ink); font-size:14px;
  }

  .btn-primary {
    width:100%; background:var(--accent-green); color:#eaf5ea; border:none;
    border-radius:10px; padding:14px; font-size:15.5px; font-weight:700; cursor:pointer;
  }
  .btn-primary:disabled { opacity:0.6; }

  .divider { display:flex; align-items:center; gap:12px; margin:26px 0; color:var(--ink-faint); font-size:12px; }
  .divider::before, .divider::after { content:""; flex:1; height:1px; background:var(--border); }

  .code-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
  .code-card h3 { font-size:15px; margin:0 0 6px; }
  .code-card p { font-size:13px; color:var(--ink-dim); margin:0 0 14px; line-height:1.5; }
  .code-row { display:flex; gap:8px; }
  .code-row input {
    flex:1; background:var(--card-2); border:1px solid var(--border); border-radius:9px;
    padding:12px 13px; color:var(--ink); font-size:15px; text-transform:uppercase; letter-spacing:0.05em;
  }
  .code-row button {
    background:var(--card-2); border:1px solid var(--border); color:var(--ink); border-radius:9px;
    padding:12px 16px; font-weight:600; font-size:13.5px; cursor:pointer; flex-shrink:0;
  }
  .code-msg { font-size:12.5px; margin-top:10px; min-height:16px; }
  .code-msg.success { color:var(--accent-green-bright); }
  .code-msg.error { color:var(--danger); }

  .already-premium { text-align:center; padding:60px 20px; }
  .already-premium .glyph { font-size:48px; margin-bottom:14px; }
  .already-premium h2 { font-size:19px; margin-bottom:8px; }
  .already-premium p { font-size:14px; color:var(--ink-dim); margin-bottom:22px; }
</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <a class="icon-btn" href="classroom-dashboard.html" aria-label="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </a>
    <h1>Go Premium</h1>
  </header>

  <main id="mainArea">
    <div class="hero"><div class="glyph">⏳</div></div>
  </main>
</div>

<script>
  const CURRENCY_SYMBOLS = { NGN: "₦", USD: "$", GHS: "₵", ZAR: "R", KES: "KSh" };

  function renderPaywall() {
    const currencies = Object.keys(PREMIUM_PRICING);
    document.getElementById("mainArea").innerHTML = `
      <div class="hero">
        <div class="glyph">🔓</div>
        <h2>Unlock every topic</h2>
        <p>One payment unlocks all premium notes and topics across every subject — no per-topic charges.</p>
      </div>

      <div class="plan-card">
        <div class="plan-price" id="planPrice">—</div>
        <div class="plan-sub">One-time payment · lifetime access</div>
        <ul class="plan-features">
          <li><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg> All premium notes, every subject</li>
          <li><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg> No repeat payments</li>
          <li><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg> Works the moment payment is confirmed</li>
        </ul>
        <div class="currency-row">
          <label for="currencySelect">Currency</label>
          <select id="currencySelect">
            ${currencies.map(c => `<option value="${c}">${c}</option>`).join("")}
          </select>
        </div>
        <button class="btn-primary" id="payBtn">Pay now</button>
      </div>

      <div class="divider">OR</div>

      <div class="code-card">
        <h3>Have an activation code?</h3>
        <p>If you paid another way (e.g. bank transfer) and were given a code, enter it here to unlock instantly.</p>
        <div class="code-row">
          <input type="text" id="codeInput" placeholder="e.g. ABCD1234" maxlength="20">
          <button id="redeemBtn">Redeem</button>
        </div>
        <div class="code-msg" id="codeMsg"></div>
      </div>
    `;

    updatePriceDisplay();
    document.getElementById("currencySelect").addEventListener("change", updatePriceDisplay);
    document.getElementById("payBtn").addEventListener("click", startCheckout);
    document.getElementById("redeemBtn").addEventListener("click", redeemCode);
  }

  function updatePriceDisplay() {
    const currency = document.getElementById("currencySelect").value;
    const amount = PREMIUM_PRICING[currency];
    const symbol = CURRENCY_SYMBOLS[currency] || currency;
    document.getElementById("planPrice").innerHTML = `${symbol}${amount.toLocaleString()} <span>${currency}</span>`;
  }

  function renderAlreadyPremium() {
    document.getElementById("mainArea").innerHTML = `
      <div class="already-premium">
        <div class="glyph">✅</div>
        <h2>You're Premium</h2>
        <p>All topics are unlocked for you. Enjoy your studying!</p>
        <a class="btn-primary" href="classroom-dashboard.html" style="display:inline-block; text-decoration:none; max-width:220px;">Back to Dashboard</a>
      </div>
    `;
  }

  async function startCheckout() {
    const payBtn = document.getElementById("payBtn");
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) { window.location.href = "login.html"; return; }

    const currency = document.getElementById("currencySelect").value;
    const amount = PREMIUM_PRICING[currency];

    payBtn.disabled = true;
    payBtn.textContent = "Opening checkout…";

    const handler = PaystackPop.setup({
      key: PAYSTACK_PUBLIC_KEY,
      email: session.user.email,
      amount: Math.round(amount * 100), // Paystack expects the smallest currency unit
      currency,
      metadata: { user_id: session.user.id },
      callback: function (response) {
        confirmPayment(response.reference);
      },
      onClose: function () {
        payBtn.disabled = false;
        payBtn.textContent = "Pay now";
      }
    });
    handler.openIframe();
  }

  async function confirmPayment(reference) {
    document.getElementById("mainArea").innerHTML = `
      <div class="already-premium">
        <div class="glyph">⏳</div>
        <h2>Confirming your payment…</h2>
        <p>This only takes a moment.</p>
      </div>`;

    const { data: { session } } = await supabaseClient.auth.getSession();
    try {
      const { data, error } = await supabaseClient.functions.invoke("verify-payment", {
        body: { reference },
        headers: { Authorization: `Bearer ${session.access_token}` }
      });
      if (error || !data?.success) throw new Error("Payment could not be confirmed yet.");
      renderAlreadyPremium();
    } catch (err) {
      document.getElementById("mainArea").innerHTML = `
        <div class="already-premium">
          <div class="glyph">⚠️</div>
          <h2>Still confirming</h2>
          <p>Your payment is being processed. If this doesn't update in a few minutes, contact classroomcareservice@gmail.com with your payment reference: <strong>${reference}</strong></p>
          <a class="btn-primary" href="classroom-dashboard.html" style="display:inline-block; text-decoration:none; max-width:220px;">Back to Dashboard</a>
        </div>`;
    }
  }

  async function redeemCode() {
    const input = document.getElementById("codeInput");
    const msg = document.getElementById("codeMsg");
    const code = input.value.trim();
    if (!code) return;

    msg.textContent = "Checking…";
    msg.className = "code-msg";

    const { data, error } = await supabaseClient.rpc("redeem_code", { code_input: code });
    if (error) {
      msg.textContent = "Something went wrong. Please try again.";
      msg.className = "code-msg error";
      return;
    }
    if (data?.success) {
      msg.textContent = data.message;
      msg.className = "code-msg success";
      setTimeout(renderAlreadyPremium, 900);
    } else {
      msg.textContent = data?.message || "That code isn't valid.";
      msg.className = "code-msg error";
    }
  }

  registerServiceWorker();

  (async () => {
    const user = await requireUser();
    if (!user) return;
    const premium = await isPremiumUser();
    if (premium) renderAlreadyPremium();
    else renderPaywall();
  })();
</script>

</body>
</html>
