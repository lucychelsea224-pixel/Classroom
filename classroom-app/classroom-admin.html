<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Classroom · Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<style>
  :root{
    --bg: #2d2d2d;
    --card: #3d3d3d;
    --card-2: #464646;
    --badge: #262626;
    --border: #4a4a4a;
    --ink: #f4f2ee;
    --ink-dim: #b7b3ab;
    --ink-faint: #857f75;
    --accent-green: #2f5c34;
    --accent-green-bright: #4c8a52;
    --danger: #c65b5b;
    --radius: 12px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  a { color: inherit; text-decoration: none; }

  /* ---- Top bar ---- */
  .topbar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    padding-top: max(14px, env(safe-area-inset-top));
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .icon-btn {
    background: none;
    border: none;
    color: var(--ink);
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  .icon-btn svg { width: 22px; height: 22px; }

  .topbar h1 {
    flex: 1;
    font-size: 20px;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .admin-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #eaf5ea;
    background: var(--accent-green);
    padding: 4px 9px;
    border-radius: 999px;
  }

  /* ---- Tabs ---- */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 4px 16px 0;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    background: none;
    border: none;
    color: var(--ink-dim);
    font-size: 14.5px;
    font-weight: 600;
    padding: 10px 4px 12px;
    margin-right: 20px;
    cursor: pointer;
    position: relative;
  }

  .tab.active { color: var(--ink); }

  .tab.active::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -1px;
    height: 2px;
    background: var(--accent-green-bright);
    border-radius: 2px;
  }

  /* ---- Subject chip selector ---- */
  .subject-chips {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .subject-chips::-webkit-scrollbar { display: none; }

  .chip {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--ink-dim);
    font-size: 13.5px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
  }

  .chip .chip-icon { font-size: 15px; line-height: 1; }

  .chip.active {
    background: var(--accent-green);
    border-color: var(--accent-green);
    color: #eaf5ea;
  }

  /* ---- Content area ---- */
  main {
    flex: 1;
    padding: 6px 16px 32px;
  }

  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 10px 0 12px;
  }

  .list-header h2 {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-dim);
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .add-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-green);
    color: #eaf5ea;
    border: none;
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
  }

  .add-btn svg { width: 15px; height: 15px; }

  .item-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .item-card {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }

  .item-body { flex: 1; min-width: 0; }

  .item-body h3 {
    margin: 0 0 4px;
    font-size: 15px;
    font-weight: 600;
  }

  .item-body p {
    margin: 0;
    font-size: 13px;
    color: var(--ink-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .item-meta {
    display: inline-block;
    margin-top: 6px;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent-green-bright);
    background: rgba(76, 138, 82, 0.15);
    padding: 3px 8px;
    border-radius: 6px;
  }

  .item-actions {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }

  .item-actions button {
    background: none;
    border: none;
    color: var(--ink-faint);
    padding: 6px;
    cursor: pointer;
    display: flex;
  }
  .item-actions button svg { width: 18px; height: 18px; }
  .item-actions button.delete:hover svg,
  .item-actions button.delete:active svg { color: var(--danger); }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--ink-faint);
  }
  .empty-state .glyph { font-size: 34px; margin-bottom: 10px; }
  .empty-state p { margin: 0; font-size: 14px; }

  /* ---- Form view ---- */
  .form-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 10px 0 18px;
  }
  .form-header h2 {
    font-size: 17px;
    font-weight: 600;
    margin: 0;
    flex: 1;
  }

  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-bottom: 7px;
  }

  .field input[type="text"],
  .field textarea {
    width: 100%;
    background: var(--card-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 13px;
    color: var(--ink);
    font-size: 15px;
    font-family: inherit;
    resize: vertical;
  }

  .field textarea { min-height: 96px; line-height: 1.45; }
  .field input[type="text"]:focus,
  .field textarea:focus {
    outline: none;
    border-color: var(--accent-green-bright);
  }

  .option-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .option-row input[type="radio"] {
    width: 18px;
    height: 18px;
    accent-color: var(--accent-green-bright);
    flex-shrink: 0;
  }

  .option-row input[type="text"] {
    flex: 1;
    background: var(--card-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--ink);
    font-size: 14.5px;
    font-family: inherit;
  }

  .option-row input[type="text"]:focus {
    outline: none;
    border-color: var(--accent-green-bright);
  }

  .option-hint {
    font-size: 12px;
    color: var(--ink-faint);
    margin: -8px 0 14px;
  }

  .form-actions {
    display: flex;
    gap: 10px;
    margin-top: 22px;
  }

  .btn {
    flex: 1;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }

  .btn-primary { background: var(--accent-green); color: #eaf5ea; }
  .btn-ghost { background: var(--card-2); color: var(--ink-dim); }

  .btn-delete-link {
    display: block;
    text-align: center;
    margin-top: 16px;
    background: none;
    border: none;
    color: var(--danger);
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    padding: 8px;
  }

  @media (max-width: 360px) {
    main { padding-left: 12px; padding-right: 12px; }
  }
</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <a class="icon-btn" href="classroom-dashboard.html" aria-label="Back to dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </a>
    <h1>Admin Panel</h1>
    <span class="admin-tag">Admin</span>
    <button class="icon-btn" aria-label="Log out" onclick="logout('admin-login.html')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
    </button>
  </header>

  <nav class="tabs" id="tabs" role="tablist"></nav>
  <div class="subject-chips" id="subjectChips" role="tablist" aria-label="Select subject"></div>

  <main id="content"></main>
</div>

<script>
  // =================================================================
  // DATA
  // Same subject list as the dashboard.
  // Notes and questions are no longer held in memory — they're read
  // from and written to Supabase (see schema.sql for the tables).
  // =================================================================
  const subjects = [
    { id: "civic-ed",       name: "Civic Education", icon: "⚖️" },
    { id: "english",        name: "English",         icon: "📖" },
    { id: "ict",            name: "ICT",             icon: "🌐" },
    { id: "mathematics",    name: "Mathematics",     icon: "🧮" },
    { id: "science",        name: "Science",         icon: "🧠" },
    { id: "social-studies", name: "Social Studies",  icon: "🏠" }
  ];

  // =================================================================
  // STATE
  // =================================================================
  const state = {
    tab: "notes",         // 'notes' | 'questions'
    subjectId: subjects[0].id,
    mode: "list",          // 'list' | 'form'
    editingId: null,        // null = new item, otherwise id being edited
    items: [],               // notes or questions for the current subject+tab
    loading: false
  };

  // =================================================================
  // SUPABASE READ/WRITE
  // =================================================================
  async function loadItems() {
    state.loading = true;
    renderContent();

    const table = state.tab === "notes" ? "notes" : "questions";
    const { data, error } = await supabaseClient
      .from(table)
      .select("*")
      .eq("subject_id", state.subjectId)
      .order("created_at", { ascending: false });

    state.loading = false;
    if (error) {
      console.error(error);
      alert("Couldn't load data: " + error.message);
      state.items = [];
    } else {
      state.items = data;
    }
    renderContent();
  }

  async function saveNote(subjectId, note) {
    const payload = { subject_id: subjectId, title: note.title, body: note.body };
    const query = note.id
      ? supabaseClient.from("notes").update({ ...payload, updated_at: new Date().toISOString() }).eq("id", note.id)
      : supabaseClient.from("notes").insert(payload);
    const { error } = await query;
    if (error) { alert("Couldn't save note: " + error.message); return false; }
    return true;
  }

  async function deleteNote(id) {
    const { error } = await supabaseClient.from("notes").delete().eq("id", id);
    if (error) { alert("Couldn't delete note: " + error.message); return false; }
    return true;
  }

  async function saveQuestion(subjectId, q) {
    const payload = {
      subject_id: subjectId,
      question: q.question,
      options: q.options,
      correct_index: q.correctIndex,
      explanation: q.explanation || null
    };
    const query = q.id
      ? supabaseClient.from("questions").update(payload).eq("id", q.id)
      : supabaseClient.from("questions").insert(payload);
    const { error } = await query;
    if (error) { alert("Couldn't save question: " + error.message); return false; }
    return true;
  }

  async function deleteQuestion(id) {
    const { error } = await supabaseClient.from("questions").delete().eq("id", id);
    if (error) { alert("Couldn't delete question: " + error.message); return false; }
    return true;
  }

  // =================================================================
  // RENDER: tabs + subject chips
  // =================================================================
  function renderTabs() {
    const tabs = [
      { id: "notes", label: "Notes" },
      { id: "questions", label: "CBT Questions" }
    ];
    document.getElementById("tabs").innerHTML = tabs.map(t => `
      <button class="tab ${state.tab === t.id ? "active" : ""}" data-action="set-tab" data-tab="${t.id}">
        ${t.label}
      </button>
    `).join("");
  }

  function renderChips() {
    document.getElementById("subjectChips").innerHTML = subjects.map(s => `
      <button class="chip ${state.subjectId === s.id ? "active" : ""}" data-action="set-subject" data-subject="${s.id}">
        <span class="chip-icon">${s.icon}</span>${s.name}
      </button>
    `).join("");
  }

  // =================================================================
  // RENDER: content (list or form, depending on state)
  // =================================================================
  function renderContent() {
    const container = document.getElementById("content");
    if (state.mode === "form") {
      container.innerHTML = state.tab === "notes" ? renderNoteForm() : renderQuestionForm();
      return;
    }
    if (state.loading) {
      container.innerHTML = `<div class="empty-state"><div class="glyph">⏳</div><p>Loading…</p></div>`;
      return;
    }
    container.innerHTML = state.tab === "notes" ? renderNoteList() : renderQuestionList();
  }

  function currentSubject() {
    return subjects.find(s => s.id === state.subjectId);
  }

  // ---- Notes: list ----
  function renderNoteList() {
    const notes = state.items;
    const subject = currentSubject();

    const listHtml = notes.length
      ? `<div class="item-list">${notes.map(n => `
          <div class="item-card">
            <div class="item-body">
              <h3>${escapeHtml(n.title)}</h3>
              <p>${escapeHtml(n.body)}</p>
            </div>
            <div class="item-actions">
              <button data-action="edit-note" data-id="${n.id}" aria-label="Edit note">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="delete" data-action="delete-note" data-id="${n.id}" aria-label="Delete note">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0-1 14a2 2 0 01-2 2H7a2 2 0 01-2-2L4 6"/></svg>
              </button>
            </div>
          </div>
        `).join("")}</div>`
      : `<div class="empty-state"><div class="glyph">📝</div><p>No notes yet for ${subject.name}.<br>Tap "Add Note" to write the first one.</p></div>`;

    return `
      <div class="list-header">
        <h2>${subject.name} · Notes</h2>
        <button class="add-btn" data-action="new-note">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          Add Note
        </button>
      </div>
      ${listHtml}
    `;
  }

  // ---- Notes: form ----
  function renderNoteForm() {
    const isEdit = state.editingId !== null;
    const existing = isEdit ? state.items.find(n => n.id === state.editingId) : null;

    return `
      <div class="form-header">
        <h2>${isEdit ? "Edit Note" : "New Note"} · ${currentSubject().name}</h2>
      </div>
      <form id="noteForm">
        <div class="field">
          <label for="noteTitle">Title</label>
          <input type="text" id="noteTitle" placeholder="e.g. The Three Arms of Government" value="${existing ? escapeHtml(existing.title) : ""}" required>
        </div>
        <div class="field">
          <label for="noteBody">Content</label>
          <textarea id="noteBody" placeholder="Write the note content here…" required>${existing ? escapeHtml(existing.body) : ""}</textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" data-action="cancel-form">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Note</button>
        </div>
      </form>
      ${isEdit ? `<button class="btn-delete-link" data-action="delete-note" data-id="${existing.id}">Delete this note</button>` : ""}
    `;
  }

  // ---- Questions: list ----
  function renderQuestionList() {
    const questions = state.items;
    const subject = currentSubject();

    const listHtml = questions.length
      ? `<div class="item-list">${questions.map(q => `
          <div class="item-card">
            <div class="item-body">
              <h3>${escapeHtml(q.question)}</h3>
              <p>Correct: ${escapeHtml(q.options[q.correct_index] || "—")}</p>
              <span class="item-meta">${q.options.length} options</span>
            </div>
            <div class="item-actions">
              <button data-action="edit-question" data-id="${q.id}" aria-label="Edit question">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="delete" data-action="delete-question" data-id="${q.id}" aria-label="Delete question">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0-1 14a2 2 0 01-2 2H7a2 2 0 01-2-2L4 6"/></svg>
              </button>
            </div>
          </div>
        `).join("")}</div>`
      : `<div class="empty-state"><div class="glyph">🧪</div><p>No CBT questions yet for ${subject.name}.<br>Tap "Add Question" to create the first one.</p></div>`;

    return `
      <div class="list-header">
        <h2>${subject.name} · CBT Questions</h2>
        <button class="add-btn" data-action="new-question">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          Add Question
        </button>
      </div>
      ${listHtml}
    `;
  }

  // ---- Questions: form ----
  function renderQuestionForm() {
    const isEdit = state.editingId !== null;
    const existing = isEdit ? state.items.find(q => q.id === state.editingId) : null;
    const options = existing ? existing.options : ["", "", "", ""];
    const correctIndex = existing ? existing.correct_index : 0;

    return `
      <div class="form-header">
        <h2>${isEdit ? "Edit Question" : "New Question"} · ${currentSubject().name}</h2>
      </div>
      <form id="questionForm">
        <div class="field">
          <label for="qText">Question</label>
          <textarea id="qText" placeholder="Type the question…" required>${escapeHtml(existing ? existing.question : "")}</textarea>
        </div>
        <div class="field">
          <label>Answer options</label>
          ${options.map((opt, i) => `
            <div class="option-row">
              <input type="radio" name="correctOption" value="${i}" ${i === correctIndex ? "checked" : ""} aria-label="Mark option ${i + 1} as correct">
              <input type="text" id="opt${i}" placeholder="Option ${i + 1}" value="${escapeHtml(opt)}" required>
            </div>
          `).join("")}
          <div class="option-hint">Select the radio button next to the correct answer.</div>
        </div>
        <div class="field">
          <label for="qExplain">Explanation (optional)</label>
          <textarea id="qExplain" placeholder="Shown to students after they answer…">${escapeHtml(existing && existing.explanation ? existing.explanation : "")}</textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" data-action="cancel-form">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Question</button>
        </div>
      </form>
      ${isEdit ? `<button class="btn-delete-link" data-action="delete-question" data-id="${existing.id}">Delete this question</button>` : ""}
    `;
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }

  function renderAll() {
    renderTabs();
    renderChips();
    renderContent();
  }

  // =================================================================
  // EVENTS (delegated — content is re-rendered often)
  // =================================================================
  document.addEventListener("click", async (e) => {
    const btn = e.target.closest("[data-action]");
    if (!btn) return;
    const action = btn.dataset.action;

    if (action === "set-tab") {
      state.tab = btn.dataset.tab;
      state.mode = "list";
      state.editingId = null;
      renderTabs(); renderChips();
      await loadItems();
    } else if (action === "set-subject") {
      state.subjectId = btn.dataset.subject;
      state.mode = "list";
      state.editingId = null;
      renderTabs(); renderChips();
      await loadItems();
    } else if (action === "new-note" || action === "new-question") {
      state.mode = "form"; state.editingId = null; renderContent();
    } else if (action === "edit-note" || action === "edit-question") {
      state.mode = "form"; state.editingId = btn.dataset.id; renderContent();
    } else if (action === "delete-note") {
      if (confirm("Delete this note? This can't be undone.")) {
        const ok = await deleteNote(btn.dataset.id);
        state.mode = "list"; state.editingId = null;
        if (ok) await loadItems(); else renderContent();
      }
    } else if (action === "delete-question") {
      if (confirm("Delete this question? This can't be undone.")) {
        const ok = await deleteQuestion(btn.dataset.id);
        state.mode = "list"; state.editingId = null;
        if (ok) await loadItems(); else renderContent();
      }
    } else if (action === "cancel-form") {
      state.mode = "list"; state.editingId = null; renderContent();
    }
  });

  document.addEventListener("submit", async (e) => {
    if (e.target.id === "noteForm") {
      e.preventDefault();
      const title = document.getElementById("noteTitle").value.trim();
      const body = document.getElementById("noteBody").value.trim();
      if (!title || !body) return;

      const ok = await saveNote(state.subjectId, { id: state.editingId, title, body });
      state.mode = "list"; state.editingId = null;
      if (ok) await loadItems(); else renderContent();
    }

    if (e.target.id === "questionForm") {
      e.preventDefault();
      const question = document.getElementById("qText").value.trim();
      const options = [0, 1, 2, 3].map(i => document.getElementById("opt" + i).value.trim());
      const explanation = document.getElementById("qExplain").value.trim();
      const correctRadio = e.target.querySelector('input[name="correctOption"]:checked');
      if (!question || options.some(o => !o) || !correctRadio) return;

      const ok = await saveQuestion(state.subjectId, {
        id: state.editingId,
        question,
        options,
        correctIndex: parseInt(correctRadio.value, 10),
        explanation
      });
      state.mode = "list"; state.editingId = null;
      if (ok) await loadItems(); else renderContent();
    }
  });

  (async () => {
    const admin = await requireAdmin(); // redirects to admin-login.html if not the admin
    if (!admin) return;
    renderTabs();
    renderChips();
    await loadItems();
  })();
</script>

</body>
</html>
