<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Classroom · Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="subjects.js"></script>
<style>
  :root{
    --bg: #2d2d2d;
    --card: #3d3d3d;
    --card-2: #464646;
    --badge: #262626;
    --border: #4a4a4a;
    --ink: #f4f2ee;
    --ink-dim: #b7b3ab;
    --ink-faint: #857f75;
    --accent-green: #2f5c34;
    --accent-green-bright: #4c8a52;
    --danger: #c65b5b;
    --radius: 12px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  a { color: inherit; text-decoration: none; }

  /* ---- Top bar ---- */
  .topbar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    padding-top: max(14px, env(safe-area-inset-top));
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .icon-btn {
    background: none;
    border: none;
    color: var(--ink);
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  .icon-btn svg { width: 22px; height: 22px; }

  .topbar h1 {
    flex: 1;
    font-size: 20px;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .admin-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #eaf5ea;
    background: var(--accent-green);
    padding: 4px 9px;
    border-radius: 999px;
  }

  /* ---- Tabs ---- */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 4px 16px 0;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    background: none;
    border: none;
    color: var(--ink-dim);
    font-size: 14.5px;
    font-weight: 600;
    padding: 10px 4px 12px;
    margin-right: 20px;
    cursor: pointer;
    position: relative;
  }

  .tab.active { color: var(--ink); }

  .tab.active::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -1px;
    height: 2px;
    background: var(--accent-green-bright);
    border-radius: 2px;
  }

  /* ---- Subject chip selector ---- */
  .subject-chips {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .subject-chips::-webkit-scrollbar { display: none; }

  .chip {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--ink-dim);
    font-size: 13.5px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
  }

  .chip .chip-icon { font-size: 15px; line-height: 1; }

  .chip.active {
    background: var(--accent-green);
    border-color: var(--accent-green);
    color: #eaf5ea;
  }

  /* ---- Content area ---- */
  main {
    flex: 1;
    padding: 6px 16px 32px;
  }

  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 10px 0 12px;
  }

  .list-header h2 {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-dim);
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .add-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-green);
    color: #eaf5ea;
    border: none;
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
  }

  .add-btn svg { width: 15px; height: 15px; }

  .add-btn-row { display: flex; gap: 8px; }
  .add-btn-ghost {
    display: flex; align-items: center; gap: 6px; background: var(--card-2); color: var(--ink-dim);
    border: 1px solid var(--border); border-radius: 999px; padding: 8px 14px;
    font-size: 13.5px; font-weight: 600; cursor: pointer;
  }
  .add-btn-ghost svg { width: 15px; height: 15px; }

  .format-toolbar { display: flex; gap: 6px; margin-bottom: 8px; }
  .format-toolbar button {
    background: var(--card-2); border: 1px solid var(--border); color: var(--ink);
    width: 32px; height: 32px; border-radius: 8px; font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .format-toolbar button:active { background: var(--accent-green); color: #eaf5ea; }

  .bulk-textarea {
    width: 100%; min-height: 260px; background: var(--card-2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 13px; color: var(--ink); font-size: 13.5px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; line-height: 1.6; resize: vertical;
  }
  .bulk-format-guide {
    background: var(--card-2); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; margin-bottom: 14px; font-size: 12.5px; color: var(--ink-dim); line-height: 1.6;
  }
  .bulk-format-guide code {
    background: rgba(0,0,0,0.25); padding: 1px 5px; border-radius: 4px; color: var(--ink);
  }
  .bulk-preview {
    background: var(--card-2); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; margin: 14px 0; font-size: 13px; color: var(--ink-dim);
  }
  .bulk-preview strong { color: var(--ink); }
  .bulk-preview-list { margin-top: 8px; max-height: 200px; overflow-y: auto; }
  .bulk-preview-item { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12.5px; }
  .bulk-preview-item:last-child { border-bottom: none; }
  .bulk-error { color: var(--danger); font-size: 12.5px; margin-top: 6px; }

  .item-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .item-card {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }

  .item-body { flex: 1; min-width: 0; }

  .item-body h3 {
    margin: 0 0 4px;
    font-size: 15px;
    font-weight: 600;
  }

  .item-body p {
    margin: 0;
    font-size: 13px;
    color: var(--ink-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .item-meta {
    display: inline-block;
    margin-top: 6px;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent-green-bright);
    background: rgba(76, 138, 82, 0.15);
    padding: 3px 8px;
    border-radius: 6px;
  }

  .item-actions {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }

  .item-actions button {
    background: none;
    border: none;
    color: var(--ink-faint);
    padding: 6px;
    cursor: pointer;
    display: flex;
  }
  .item-actions button svg { width: 18px; height: 18px; }
  .item-actions button.delete:hover svg,
  .item-actions button.delete:active svg { color: var(--danger); }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--ink-faint);
  }
  .empty-state .glyph { font-size: 34px; margin-bottom: 10px; }
  .empty-state p { margin: 0; font-size: 14px; }

  /* ---- Form view ---- */
  .form-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 10px 0 18px;
  }
  .form-header h2 {
    font-size: 17px;
    font-weight: 600;
    margin: 0;
    flex: 1;
  }

  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-bottom: 7px;
  }

  .field input[type="text"],
  .field textarea {
    width: 100%;
    background: var(--card-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 13px;
    color: var(--ink);
    font-size: 15px;
    font-family: inherit;
    resize: vertical;
  }

  .field textarea { min-height: 96px; line-height: 1.45; }
  .field input[type="text"]:focus,
  .field textarea:focus {
    outline: none;
    border-color: var(--accent-green-bright);
  }

  .option-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .option-row input[type="radio"] {
    width: 18px;
    height: 18px;
    accent-color: var(--accent-green-bright);
    flex-shrink: 0;
  }

  .option-row input[type="text"] {
    flex: 1;
    background: var(--card-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--ink);
    font-size: 14.5px;
    font-family: inherit;
  }

  .option-row input[type="text"]:focus {
    outline: none;
    border-color: var(--accent-green-bright);
  }

  .option-hint {
    font-size: 12px;
    color: var(--ink-faint);
    margin: -8px 0 14px;
  }

  .form-actions {
    display: flex;
    gap: 10px;
    margin-top: 22px;
  }

  .btn {
    flex: 1;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }

  .btn-primary { background: var(--accent-green); color: #eaf5ea; }
  .btn-ghost { background: var(--card-2); color: var(--ink-dim); }

  .btn-delete-link {
    display: block;
    text-align: center;
    margin-top: 16px;
    background: none;
    border: none;
    color: var(--danger);
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    padding: 8px;
  }

  @media (max-width: 360px) {
    main { padding-left: 12px; padding-right: 12px; }
  }
</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <a class="icon-btn" href="classroom-dashboard.html" aria-label="Back to dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </a>
    <h1>Admin Panel</h1>
    <span class="admin-tag">Admin</span>
    <button class="icon-btn" aria-label="Log out" onclick="logout('admin-login.html')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
    </button>
  </header>

  <nav class="tabs" id="tabs" role="tablist"></nav>
  <div class="subject-chips" id="subjectChips" role="tablist" aria-label="Select subject"></div>
  <div class="subject-chips" id="testChips" role="tablist" aria-label="Select test batch"></div>

  <main id="content"></main>
</div>

<script>
  // =================================================================
  // DATA
  // Same subject list as the dashboard.
  // Notes and questions are no longer held in memory — they're read
  // from and written to Supabase (see schema.sql for the tables).
  // =================================================================
  const subjects = SUBJECTS; // from subjects.js

  const TEST_NUMBERS = [1, 2, 3, 4, 5];

  // =================================================================
  // STATE
  // =================================================================
  const state = {
    tab: "notes",         // 'notes' | 'questions'
    subjectId: subjects[0].id,
    testFilter: "all",      // 'all' | 1 | 2 | 3 | 4 | 5  (questions tab only)
    mode: "list",          // 'list' | 'form' | 'bulk'
    bulkParsed: null,       // parsed items waiting for confirmation during bulk import
    pendingImageUrl: null,   // question image being edited in the current form
    pendingOptionImages: [null, null, null, null],
    editingId: null,        // null = new item, otherwise id being edited
    items: [],               // notes or questions for the current subject+tab
    loading: false
  };

  function renderTestChips() {
    const el = document.getElementById("testChips");
    if (state.tab !== "questions") { el.innerHTML = ""; el.style.display = "none"; return; }
    el.style.display = "flex";
    const options = [{ v: "all", label: "All tests" }, ...TEST_NUMBERS.map(n => ({ v: n, label: "Test " + n }))];
    el.innerHTML = options.map(o => `
      <button class="chip ${state.testFilter == o.v ? "active" : ""}" data-action="set-test-filter" data-test="${o.v}">
        ${o.label}
      </button>
    `).join("");
  }

  // =================================================================
  // SUPABASE READ/WRITE
  // =================================================================
  async function loadItems() {
    state.loading = true;
    renderTestChips();
    renderContent();

    if (state.tab === "codes") {
      const { data, error } = await supabaseClient
        .from("activation_codes")
        .select("*")
        .order("created_at", { ascending: false });
      state.loading = false;
      if (error) { console.error(error); alert("Couldn't load codes: " + error.message); state.items = []; }
      else state.items = data;
      renderContent();
      return;
    }

    const table = state.tab === "notes" ? "notes" : "questions";
    let query = supabaseClient
      .from(table)
      .select("*")
      .eq("subject_id", state.subjectId);

    if (state.tab === "questions" && state.testFilter !== "all") {
      query = query.eq("test_number", parseInt(state.testFilter, 10));
    }

    const { data, error } = await query.order("created_at", { ascending: false });

    state.loading = false;
    if (error) {
      console.error(error);
      alert("Couldn't load data: " + error.message);
      state.items = [];
    } else {
      state.items = data;
    }
    renderTestChips();
    renderContent();
  }

  async function saveNote(subjectId, note) {
    const payload = { subject_id: subjectId, title: note.title, body: note.body };
    const query = note.id
      ? supabaseClient.from("notes").update({ ...payload, updated_at: new Date().toISOString() }).eq("id", note.id)
      : supabaseClient.from("notes").insert(payload);
    const { error } = await query;
    if (error) { alert("Couldn't save note: " + error.message); return false; }
    return true;
  }

  async function deleteNote(id) {
    const { error } = await supabaseClient.from("notes").delete().eq("id", id);
    if (error) { alert("Couldn't delete note: " + error.message); return false; }
    return true;
  }

  async function saveQuestion(subjectId, q) {
    const payload = {
      subject_id: subjectId,
      question: q.question,
      options: q.options,
      correct_index: q.correctIndex,
      explanation: q.explanation || null,
      test_number: q.testNumber,
      image_url: q.imageUrl || null,
      option_images: q.optionImages || null
    };
    const query = q.id
      ? supabaseClient.from("questions").update(payload).eq("id", q.id)
      : supabaseClient.from("questions").insert(payload);
    const { error } = await query;
    if (error) { alert("Couldn't save question: " + error.message); return false; }
    return true;
  }

  async function deleteQuestion(id) {
    const { error } = await supabaseClient.from("questions").delete().eq("id", id);
    if (error) { alert("Couldn't delete question: " + error.message); return false; }
    return true;
  }

  async function toggleNoteLock(id, currentlyLocked) {
    const { error } = await supabaseClient.from("notes").update({ is_locked: !currentlyLocked }).eq("id", id);
    if (error) { alert("Couldn't update lock: " + error.message); return false; }
    return true;
  }

  function generateCode() {
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // no O/0/I/1 to avoid confusion
    let code = "";
    for (let i = 0; i < 10; i++) {
      if (i === 5) code += "-";
      code += chars[Math.floor(Math.random() * chars.length)];
    }
    return code;
  }

  async function createActivationCode(note) {
    const code = generateCode();
    const { error } = await supabaseClient.from("activation_codes").insert({ code, note: note || null });
    if (error) { alert("Couldn't create code: " + error.message); return false; }
    return true;
  }

  async function deleteActivationCode(code) {
    const { error } = await supabaseClient.from("activation_codes").delete().eq("code", code);
    if (error) { alert("Couldn't delete code: " + error.message); return false; }
    return true;
  }

  // =================================================================
  // RENDER: tabs + subject chips
  // =================================================================
  function renderTabs() {
    const tabs = [
      { id: "notes", label: "Notes" },
      { id: "questions", label: "CBT Questions" },
      { id: "codes", label: "Activation Codes" }
    ];
    document.getElementById("tabs").innerHTML = tabs.map(t => `
      <button class="tab ${state.tab === t.id ? "active" : ""}" data-action="set-tab" data-tab="${t.id}">
        ${t.label}
      </button>
    `).join("");
  }

  function renderChips() {
    const el = document.getElementById("subjectChips");
    if (state.tab === "codes") { el.innerHTML = ""; el.style.display = "none"; return; }
    el.style.display = "flex";
    el.innerHTML = subjects.map(s => `
      <button class="chip ${state.subjectId === s.id ? "active" : ""}" data-action="set-subject" data-subject="${s.id}">
        <span class="chip-icon">${s.icon}</span>${s.name}
      </button>
    `).join("");
  }

  // =================================================================
  // RENDER: content (list or form, depending on state)
  // =================================================================
  function renderContent() {
    const container = document.getElementById("content");
    if (state.tab === "codes") {
      container.innerHTML = state.loading
        ? `<div class="empty-state"><div class="glyph">⏳</div><p>Loading…</p></div>`
        : renderCodesList();
      return;
    }
    if (state.mode === "form") {
      container.innerHTML = state.tab === "notes" ? renderNoteForm() : renderQuestionForm();
      attachFormatToolbar();
      if (state.tab === "questions") attachImageUploadHandlers();
      return;
    }
    if (state.mode === "bulk") {
      container.innerHTML = state.tab === "notes" ? renderNoteBulkForm() : renderQuestionBulkForm();
      return;
    }
    if (state.loading) {
      container.innerHTML = `<div class="empty-state"><div class="glyph">⏳</div><p>Loading…</p></div>`;
      return;
    }
    container.innerHTML = state.tab === "notes" ? renderNoteList() : renderQuestionList();
  }

  function renderCodesList() {
    const codes = state.items;
    const listHtml = codes.length
      ? `<div class="item-list">${codes.map(c => `
          <div class="item-card">
            <div class="item-body">
              <h3 style="font-family:ui-monospace,monospace; letter-spacing:0.03em;">${escapeHtml(c.code)}</h3>
              <span class="item-meta" style="${c.is_used ? "color:var(--danger); background:rgba(198,91,91,0.15);" : ""}">
                ${c.is_used ? "Used" : "Unused"}
              </span>
              ${c.note ? `<p style="margin-top:6px;">${escapeHtml(c.note)}</p>` : ""}
            </div>
            <div class="item-actions">
              <button data-action="delete-code" data-code="${escapeHtml(c.code)}" aria-label="Delete code">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0-1 14a2 2 0 01-2 2H7a2 2 0 01-2-2L4 6"/></svg>
              </button>
            </div>
          </div>
        `).join("")}</div>`
      : `<div class="empty-state"><div class="glyph">🔑</div><p>No activation codes yet.<br>Generate one for anyone who pays outside Paystack (e.g. bank transfer).</p></div>`;

    return `
      <div class="list-header">
        <h2>Activation Codes</h2>
        <button class="add-btn" data-action="new-code">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          Generate Code
        </button>
      </div>
      ${listHtml}
    `;
  }

  function currentSubject() {
    return subjects.find(s => s.id === state.subjectId);
  }

  // ---- Notes: list ----
  function renderNoteList() {
    const notes = state.items;
    const subject = currentSubject();

    const listHtml = notes.length
      ? `<div class="item-list">${notes.map(n => `
          <div class="item-card">
            <div class="item-body">
              <h3>${escapeHtml(n.title)} ${n.is_locked ? `<span class="item-meta" style="color:#e0a458; background:rgba(224,164,88,0.15);">🔒 Premium</span>` : ""}</h3>
              <p>${escapeHtml(n.body)}</p>
            </div>
            <div class="item-actions">
              <button data-action="toggle-lock" data-id="${n.id}" data-locked="${n.is_locked ? "1" : "0"}" aria-label="${n.is_locked ? "Unlock" : "Lock"} note" title="${n.is_locked ? "Unlock this note" : "Lock this note (premium only)"}">
                ${n.is_locked
                  ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 018 0v3"/></svg>`
                  : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 017.75-1.5"/></svg>`}
              </button>
              <button data-action="edit-note" data-id="${n.id}" aria-label="Edit note">

  function escapeHtml(str) {

  // ---- Formatting toolbar (Bold / Italic / Bullet) for textareas ----
  function attachFormatToolbar() {
    document.querySelectorAll(".format-toolbar button").forEach((btn) => {
      btn.addEventListener("click", () => {
        const textarea = btn.closest(".field").querySelector("textarea");
        if (!textarea) return;
        if (btn.dataset.wrap) {
          const [before, after] = btn.dataset.wrap.split("|");
          wrapSelection(textarea, before, after);
        } else if (btn.hasAttribute("data-bullet")) {
          insertBullet(textarea);
        }
      });
    });
  }

  function wrapSelection(textarea, before, after) {
    const start = textarea.selectionStart, end = textarea.selectionEnd;
    const text = textarea.value;
    const selected = text.slice(start, end) || "text";
    textarea.value = text.slice(0, start) + before + selected + after + text.slice(end);
    textarea.focus();
    textarea.selectionStart = start + before.length;
    textarea.selectionEnd = start + before.length + selected.length;
  }

  function insertBullet(textarea) {
    const start = textarea.selectionStart;
    const text = textarea.value;
    const lineStart = text.lastIndexOf("\n", start - 1) + 1;
    textarea.value = text.slice(0, lineStart) + "- " + text.slice(lineStart);
    textarea.focus();
    textarea.selectionStart = textarea.selectionEnd = start + 2;
  }

  async function uploadImageFile(file) {
    if (!file) return null;
    const ext = (file.name.split(".").pop() || "jpg").toLowerCase().replace(/[^a-z0-9]/g, "");
    const path = `${Date.now()}-${Math.random().toString(36).slice(2, 8)}.${ext}`;
    const { error } = await supabaseClient.storage.from("question-images").upload(path, file);
    if (error) { alert("Image upload failed: " + error.message); return null; }
    const { data } = supabaseClient.storage.from("question-images").getPublicUrl(path);
    return data.publicUrl;
  }

  function attachImageUploadHandlers() {
    const form = document.getElementById("questionForm");
    if (!form) return;

    form.addEventListener("click", (e) => {

  // =================================================================
  // BULK IMPORT — Notes
  // Format:
  //   ### Note Title
  //   Note body text, can span multiple lines.
  //
  //   ### Next Note Title
  //   Its body text...
  // =================================================================
  function parseNotesBulk(text) {
    const blocks = text.split(/\n(?=###\s)/).map(b => b.trim()).filter(Boolean);
    const items = [];
    const errors = [];
    blocks.forEach((block, i) => {
      const match = block.match(/^###\s*(.+?)\n([\s\S]*)$/);
      if (!match) { errors.push(`Block ${i + 1}: couldn't find a "### Title" line.`); return; }
      const title = match[1].trim();
      const body = match[2].trim();
      if (!title || !body) { errors.push(`Block ${i + 1}: missing a title or body.`); return; }
      items.push({ title, body });
    });
    return { items, errors };
  }

  function renderNoteBulkForm() {
    return `
      <div class="form-header"><h2>Bulk Import Notes · ${currentSubject().name}</h2></div>
      <div class="bulk-format-guide">
        Paste multiple notes at once. Start each note with <code>### Title</code> on its own line, followed by the note's body text. Leave a blank line between notes.
      </div>
      <textarea class="bulk-textarea" id="bulkText" placeholder="### The Three Arms of Government
The Executive, Legislature, and Judiciary — what each one does...

### Another Note Title
Body text here..."></textarea>
      <div id="bulkPreviewArea"></div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" data-action="cancel-form">Cancel</button>
        <button type="button" class="btn btn-primary" data-action="preview-bulk-notes">Preview</button>
      </div>
    `;
  }

  // =================================================================
  // BULK IMPORT — Questions
  // Format:
  //   Q: Question text here?
  //   A) Option one
  //   *B) Option two   <- asterisk marks the correct answer
  //   C) Option three
  //   D) Option four
  //   Explanation: Why B is correct.
  //
  //   Q: Next question...
  //   ...
  // =================================================================
  function parseQuestionsBulk(text) {
    const blocks = text.split(/\n(?=Q:\s)/).map(b => b.trim()).filter(Boolean);
    const items = [];
    const errors = [];

    blocks.forEach((block, i) => {
      const lines = block.split("\n").map(l => l.trim()).filter(Boolean);
      if (!lines.length || !lines[0].startsWith("Q:")) {
        errors.push(`Block ${i + 1}: doesn't start with "Q:".`);
        return;
      }
      const question = lines[0].replace(/^Q:\s*/, "").trim();
      const options = [];
      let correctIndex = -1;
      let explanation = "";

      lines.slice(1).forEach((line) => {
        const optMatch = line.match(/^(\*?)([A-F])\)\s*(.+)$/);
        if (optMatch) {
          if (optMatch[1] === "*") correctIndex = options.length;
          options.push(optMatch[3].trim());
          return;
        }
        const explMatch = line.match(/^Explanation:\s*(.+)$/i);
        if (explMatch) explanation = explMatch[1].trim();
      });

      if (!question) { errors.push(`Block ${i + 1}: missing question text.`); return; }
      if (options.length < 2) { errors.push(`Block ${i + 1} ("${question.slice(0, 40)}..."): needs at least 2 options.`); return; }
      if (correctIndex === -1) { errors.push(`Block ${i + 1} ("${question.slice(0, 40)}..."): no option marked correct (use *A) instead of A)).`); return; }

      items.push({ question, options, correctIndex, explanation });
    });

    return { items, errors };
  }

  function renderQuestionBulkForm() {
    const testNumber = state.testFilter !== "all" ? parseInt(state.testFilter, 10) : 1;
    return `

        Paste multiple questions at once. Start each with <code>Q:</code>, list options as <code>A)</code>, <code>B)</code>, etc., mark the correct one with a <code>*</code> before its letter (e.g. <code>*B)</code>), and optionally add <code>Explanation:</code> on its own line. Leave a blank line between questions.
      </div>
      <textarea class="bulk-textarea" id="bulkText" placeholder="Q: What is the capital of Nigeria?
A) Lagos
*B) Abuja
C) Kano
D) Ibadan
Explanation: Abuja became Nigeria's capital in 1991.

Q: Next question..."></textarea>

  function renderBulkPreview(result, kind) {
    const area = document.getElementById("bulkPreviewArea");
    if (!result.items.length && !result.errors.length) { area.innerHTML = ""; return; }

    const itemsHtml = result.items.map(item =>
      kind === "notes"
        ? `<div class="bulk-preview-item">📝 ${escapeHtml(item.title)}</div>`
        : `<div class="bulk-preview-item">❓ ${escapeHtml(item.question.slice(0, 70))}${item.question.length > 70 ? "…" : ""}</div>`
    ).join("");

    const errorsHtml = result.errors.map(e => `<div class="bulk-error">⚠️ ${escapeHtml(e)}</div>`).join("");

    area.innerHTML = `
      <div class="bulk-preview">
        <strong>${result.items.length} ${kind === "notes" ? "note" : "question"}${result.items.length === 1 ? "" : "s"} ready to import</strong>
        ${result.errors.length ? `<div style="margin-top:8px;">${result.errors.length} block${result.errors.length === 1 ? "" : "s"} skipped:</div>${errorsHtml}` : ""}
        ${result.items.length ? `<div class="bulk-preview-list">${itemsHtml}</div>` : ""}
      </div>
      ${result.items.length ? `<div class="form-actions"><button type="button" class="btn btn-primary" data-action="confirm-bulk-${kind}">Import ${result.items.length} ${kind === "notes" ? "Note" : "Question"}${result.items.length === 1 ? "" : "s"}</button></div>` : ""}
    `;
  }

  async function bulkInsertNotes(items) {
    const payload = items.map(n => ({ subject_id: state.subjectId, title: n.title, body: n.body }));
    const { error } = await supabaseClient.from("notes").insert(payload);
    if (error) { alert("Bulk import failed: " + error.message); return false; }
    return true;
  }

  async function bulkInsertQuestions(items, testNumber) {
    const payload = items.map(q => ({
      subject_id: state.subjectId,
      question: q.question,
      options: q.options,
      correct_index: q.correctIndex,
      explanation: q.explanation || null,
      test_number: testNumber
    }));
    const { error } = await supabaseClient.from("questions").insert(payload);
    if (error) { alert("Bulk import failed: " + error.message); return false; }
    return true;
  }

  function renderAll() {
    renderTabs();
    renderChips();
    renderContent();
  }

  // =================================================================
  // EVENTS (delegated — content is re-rendered often)
  // =================================================================
  document.addEventListener("click", async (e) => {
    const btn = e.target.closest("[data-action]");
    if (!btn) return;
    const action = btn.dataset.action;

    if (action === "set-tab") {
      state.tab = btn.dataset.tab;
      state.mode = "list";
      state.editingId = null;
      renderTabs(); renderChips();
      await loadItems();
    } else if (action === "set-subject") {
      state.subjectId = btn.dataset.subject;
      state.mode = "list";
      state.editingId = null;
      renderTabs(); renderChips();
      await loadItems();
    } else if (action === "set-test-filter") {
      state.testFilter = btn.dataset.test;
      state.mode = "list";
      state.editingId = null;
      await loadItems();
    } else if (action === "new-note" || action === "new-question") {
      state.mode = "form"; state.editingId = null;
      state.pendingImageUrl = null; state.pendingOptionImages = [null, null, null, null];
      renderContent();
    } else if (action === "bulk-notes" || action === "bulk-questions") {
      state.mode = "bulk"; state.bulkParsed = null; renderContent();
    } else if (action === "preview-bulk-notes") {
      const text = document.getElementById("bulkText").value;
      const result = parseNotesBulk(text);
      state.bulkParsed = result;
      renderBulkPreview(result, "notes");
    } else if (action === "preview-bulk-questions") {
      const text = document.getElementById("bulkText").value;
      const result = parseQuestionsBulk(text);
      state.bulkParsed = result;
      renderBulkPreview(result, "questions");
    } else if (action === "confirm-bulk-notes") {
      if (!state.bulkParsed || !state.bulkParsed.items.length) return;
      btn.disabled = true; btn.textContent = "Importing…";
      const ok = await bulkInsertNotes(state.bulkParsed.items);
      state.mode = "list"; state.bulkParsed = null;
      if (ok) await loadItems(); else renderContent();
    } else if (action === "confirm-bulk-questions") {
      if (!state.bulkParsed || !state.bulkParsed.items.length) return;
      btn.disabled = true; btn.textContent = "Importing…";
      const testNumber = parseInt(document.getElementById("bulkTest").value, 10);
      const ok = await bulkInsertQuestions(state.bulkParsed.items, testNumber);
      state.mode = "list"; state.bulkParsed = null;
      if (ok) await loadItems(); else renderContent();
    } else if (action === "toggle-lock") {
      const ok = await toggleNoteLock(btn.dataset.id, btn.dataset.locked === "1");
      if (ok) await loadItems();
    } else if (action === "new-code") {
      btn.disabled = true; btn.textContent = "Generating…";
      const ok = await createActivationCode("");
      if (ok) await loadItems();
    } else if (action === "delete-code") {
      if (confirm("Delete this activation code? This can't be undone.")) {
        const ok = await deleteActivationCode(btn.dataset.code);
        if (ok) await loadItems();
      }
    } else if (action === "edit-note" || action === "edit-question") {
      state.mode = "form"; state.editingId = btn.dataset.id;
      if (action === "edit-question") {
        const q = state.items.find(item => item.id === btn.dataset.id);
        state.pendingImageUrl = q?.image_url || null;
        const opts = q?.options || ["", "", "", ""];
        state.pendingOptionImages = opts.map((_, i) => (q?.option_images && q.option_images[i]) || null);
      }
      renderContent();
    } else if (action === "delete-note") {
      if (confirm("Delete this note? This can't be undone.")) {
        const ok = await deleteNote(btn.dataset.id);
        state.mode = "list"; state.editingId = null;
        if (ok) await loadItems(); else renderContent();
      }
    } else if (action === "delete-question") {
      if (confirm("Delete this question? This can't be undone.")) {
        const ok = await deleteQuestion(btn.dataset.id);
        state.mode = "list"; state.editingId = null;
        if (ok) await loadItems(); else renderContent();
      }
    } else if (action === "cancel-form") {
      state.mode = "list"; state.editingId = null;
      state.pendingImageUrl = null; state.pendingOptionImages = [null, null, null, null];
      renderContent();
    }
  });

  document.addEventListener("submit", async (e) => {
    if (e.target.id === "noteForm") {
      e.preventDefault();
      const title = document.getElementById("noteTitle").value.trim();
      const body = document.getElementById("noteBody").value.trim();
      if (!title || !body) return;

      const ok = await saveNote(state.subjectId, { id: state.editingId, title, body });
      state.mode = "list"; state.editingId = null;
      if (ok) await loadItems(); else renderContent();
    }

    if (e.target.id === "questionForm") {
      e.preventDefault();
      const question = document.getElementById("qText").value.trim();
      const options = [0, 1, 2, 3].map(i => document.getElementById("opt" + i).value.trim());
      const explanation = document.getElementById("qExplain").value.trim();
      const testNumber = parseInt(document.getElementById("qTest").value, 10);
      const correctRadio = e.target.querySelector('input[name="correctOption"]:checked');
      if (!question || options.some(o => !o) || !correctRadio) return;

      const ok = await saveQuestion(state.subjectId, {
        id: state.editingId,
        question,
        options,
        correctIndex: parseInt(correctRadio.value, 10),
        explanation,
        testNumber,
        imageUrl: state.pendingImageUrl,
        optionImages: state.pendingOptionImages.some(u => u) ? state.pendingOptionImages : null
      });
      state.mode = "list"; state.editingId = null;
      state.pendingImageUrl = null; state.pendingOptionImages = [null, null, null, null];
      if (ok) await loadItems(); else renderContent();
    }
  });

  (async () => {
    const admin = await requireAdmin(); // redirects to admin-login.html if not the admin
    if (!admin) return;
    renderTabs();
    renderChips();
    await loadItems();
  })();
</script>

</body>
</html>
