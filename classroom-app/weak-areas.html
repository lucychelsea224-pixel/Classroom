<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Weak Areas · Classroom</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2d2d2d">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="offline-store.js"></script>
<script src="subjects.js"></script>
<style>
  :root{
    --bg: #2d2d2d; --card: #3d3d3d; --card-2: #464646; --border: #4a4a4a;
    --ink: #f4f2ee; --ink-dim: #b7b3ab; --ink-faint: #857f75;
    --accent-green: #2f5c34; --accent-green-bright: #4c8a52;
    --danger: #c65b5b; --radius: 12px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    -webkit-font-smoothing: antialiased; min-height:100vh; }
  a { color:inherit; text-decoration:none; }
  button { font-family: inherit; }

  .app { max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }

  .topbar { display:flex; align-items:center; gap:14px; padding:14px 16px;
    padding-top:max(14px, env(safe-area-inset-top)); position:sticky; top:0; background:var(--bg); z-index:5; }
  .icon-btn { background:none; border:none; color:var(--ink); padding:4px; display:flex;
    align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .icon-btn svg { width:22px; height:22px; }
  .topbar h1 { flex:1; font-size:19px; font-weight:600; margin:0; }

  main { flex:1; padding:8px 16px 40px; }
  .lead { font-size:13.5px; color:var(--ink-dim); margin:0 0 20px; line-height:1.5; }

  .subject-row {
    display:flex; align-items:center; gap:14px; background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); padding:16px; margin-bottom:10px; cursor:pointer; transition:transform 0.15s ease;
  }
  .subject-row:active { transform: scale(0.98); }
  .subject-row .glyph { font-size:26px; flex-shrink:0; }
  .subject-row .info { flex:1; min-width:0; }
  .subject-row .info h3 { margin:0 0 4px; font-size:15px; font-weight:600; }
  .subject-row .info p { margin:0; font-size:12.5px; color:var(--ink-dim); }
  .accuracy-badge {
    font-size:13px; font-weight:700; padding:5px 11px; border-radius:999px; flex-shrink:0;
  }
  .accuracy-badge.good { background:rgba(76,138,82,0.18); color:var(--accent-green-bright); }
  .accuracy-badge.mid { background:rgba(224,164,88,0.18); color:#e0a458; }
  .accuracy-badge.weak { background:rgba(198,91,91,0.18); color:var(--danger); }
  .chevron { color:var(--ink-faint); flex-shrink:0; }
  .chevron svg { width:16px; height:16px; }

  .detail-back {
    display:flex; align-items:center; gap:8px; background:none; border:none; color:var(--accent-green-bright);
    padding:6px 0 16px; font-size:14px; font-weight:600; cursor:pointer;
  }
  .detail-back svg { width:18px; height:18px; }

  .practice-btn {
    display:block; width:100%; text-align:center; background:var(--accent-green); color:#eaf5ea;
    border:none; border-radius:10px; padding:14px; font-size:15px; font-weight:700; cursor:pointer; margin-bottom:20px;
  }

  .missed-item {
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    padding:15px 16px; margin-bottom:10px;
  }
  .missed-item h4 { margin:0 0 8px; font-size:14px; font-weight:600; line-height:1.5; }
  .missed-item .answer-line { font-size:12.5px; color:var(--ink-dim); margin-bottom:4px; }
  .missed-item .answer-line .correct-text { color:var(--accent-green-bright); font-weight:600; }
  .missed-item .miss-count {
    display:inline-block; font-size:11px; font-weight:700; color:var(--danger);
    background:rgba(198,91,91,0.14); padding:3px 9px; border-radius:999px; margin-top:6px;
  }

  .empty-state { text-align:center; padding:60px 20px; color:var(--ink-faint); }
  .empty-state .glyph { font-size:44px; margin-bottom:14px; }
  .empty-state h2 { font-size:17px; color:var(--ink); margin-bottom:8px; }
  .empty-state p { font-size:13.5px; line-height:1.6; }
</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <a class="icon-btn" href="classroom-dashboard.html" aria-label="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </a>
    <h1>Weak Areas</h1>
  </header>

  <main id="mainArea">
    <div class="empty-state"><div class="glyph">⏳</div><p>Loading…</p></div>
  </main>
</div>

<script>
  let currentUser = null;
  let attemptsBySubject = {}; // subjectId -> array of attempt rows (most recent per question)

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }

  function accuracyClass(pct) {
    if (pct >= 75) return "good";
    if (pct >= 50) return "mid";
    return "weak";
  }

  // ---- Subject list view ----
  function renderSubjectList() {
    const rows = Object.keys(attemptsBySubject).map(subjectId => {
      const subject = SUBJECTS.find(s => s.id === subjectId);
      if (!subject) return null;
      const attempts = attemptsBySubject[subjectId];
      const correct = attempts.filter(a => a.is_correct).length;
      const pct = attempts.length ? Math.round((correct / attempts.length) * 100) : 0;
      const missedCount = attempts.filter(a => !a.is_correct).length;
      return { subject, pct, missedCount, attempted: attempts.length };
    }).filter(Boolean).sort((a, b) => a.pct - b.pct); // weakest first

    const main = document.getElementById("mainArea");

    if (!rows.length) {
      main.innerHTML = `
        <div class="empty-state">
          <div class="glyph">📊</div>
          <h2>No data yet</h2>
          <p>Take a CBT test in any subject and this page will start showing you exactly which topics need more practice.</p>
        </div>`;
      return;
    }

    main.innerHTML = `
      <p class="lead">Based on all the tests you've taken so far, sorted so the subjects needing the most work show up first.</p>
      ${rows.map(r => `
        <div class="subject-row" data-subject="${r.subject.id}">
          <div class="glyph">${r.subject.icon}</div>
          <div class="info">
            <h3>${r.subject.name}</h3>
            <p>${r.missedCount} question${r.missedCount === 1 ? "" : "s"} to review · ${r.attempted} answered total</p>
          </div>
          <span class="accuracy-badge ${accuracyClass(r.pct)}">${r.pct}%</span>
          <span class="chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span>
        </div>
      `).join("")}
    `;

    main.querySelectorAll("[data-subject]").forEach(row => {
      row.addEventListener("click", () => renderSubjectDetail(row.dataset.subject));
    });
  }

  // ---- Subject detail: which specific questions are being missed ----
  async function renderSubjectDetail(subjectId) {
    const subject = SUBJECTS.find(s => s.id === subjectId);
    const main = document.getElementById("mainArea");
    main.innerHTML = `<div class="empty-state"><div class="glyph">⏳</div><p>Loading…</p></div>`;

    // Find the most recent attempt per question, keep only ones currently wrong
    const attempts = attemptsBySubject[subjectId] || [];
    const latestByQuestion = {};
    attempts.forEach(a => {
      const existing = latestByQuestion[a.question_id];
      if (!existing || new Date(a.created_at) > new Date(existing.created_at)) {
        latestByQuestion[a.question_id] = a;
      }
    });
    const missedIds = Object.values(latestByQuestion).filter(a => !a.is_correct).map(a => a.question_id);

    if (!missedIds.length) {
      main.innerHTML = `
        <button class="detail-back" id="backToList">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          All subjects
        </button>
        <div class="empty-state">
          <div class="glyph">🎉</div>
          <h2>All caught up!</h2>
          <p>You're not currently missing any ${escapeHtml(subject.name)} questions from past attempts. Nice work.</p>
        </div>`;
      document.getElementById("backToList").addEventListener("click", renderSubjectList);
      return;
    }

    const { data: questions, error } = await supabaseClient
      .from("questions")
      .select("*")
      .in("id", missedIds);

    const missCounts = {};
    attempts.forEach(a => {
      if (!a.is_correct) missCounts[a.question_id] = (missCounts[a.question_id] || 0) + 1;
    });

    const questionList = (questions || []).sort((a, b) => (missCounts[b.id] || 0) - (missCounts[a.id] || 0));

    main.innerHTML = `
      <button class="detail-back" id="backToList">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        All subjects
      </button>
      <button class="practice-btn" id="practiceBtn">Practice these ${questionList.length} question${questionList.length === 1 ? "" : "s"}</button>
      ${questionList.map(q => `
        <div class="missed-item">
          <h4>${escapeHtml(q.question)}</h4>
          <div class="answer-line">Correct answer: <span class="correct-text">${escapeHtml(q.options[q.correct_index])}</span></div>
          ${error ? "" : `<span class="miss-count">Missed ${missCounts[q.id] || 1}×</span>`}
        </div>
      `).join("")}
    `;

    document.getElementById("backToList").addEventListener("click", renderSubjectList);
    document.getElementById("practiceBtn").addEventListener("click", () => {
      const ids = questionList.map(q => q.id).join(",");
      window.location.href = `quiz.html?id=${encodeURIComponent(subjectId)}&ids=${encodeURIComponent(ids)}`;
    });
  }

  (async () => {
    const user = await requireUser();
    if (!user) return;
    currentUser = user;

    const { data, error } = await supabaseClient
      .from("quiz_attempts")
      .select("*")
      .eq("user_id", user.id)
      .order("created_at", { ascending: true });

    if (!error && data) {
      data.forEach(row => {
        if (!attemptsBySubject[row.subject_id]) attemptsBySubject[row.subject_id] = [];
        attemptsBySubject[row.subject_id].push(row);
      });
    }

    renderSubjectList();
  })();
</script>

</body>
</html>
