<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Notes · Classroom</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2d2d2d">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="offline-store.js"></script>
<style>
  :root{
    --bg: #2d2d2d; --card: #3d3d3d; --border: #4a4a4a;
    --ink: #f4f2ee; --ink-dim: #b7b3ab; --ink-faint: #857f75;
    --accent-green: #2f5c34; --accent-green-bright: #4c8a52; --radius: 12px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    -webkit-font-smoothing: antialiased; min-height:100vh; }
  a { color:inherit; text-decoration:none; }

  .app { max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }

  .topbar { display:flex; align-items:center; gap:14px; padding:14px 16px;
    padding-top:max(14px, env(safe-area-inset-top)); position:sticky; top:0; background:var(--bg); z-index:5; }
  .icon-btn { background:none; border:none; color:var(--ink); padding:4px; display:flex;
    align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .icon-btn svg { width:22px; height:22px; }
  .topbar h1 { flex:1; font-size:19px; font-weight:600; margin:0; letter-spacing:-0.01em; }

  .offline-banner {
    display:flex; align-items:center; gap:8px; margin:4px 14px 10px; padding:9px 13px;
    background:#4a3a20; border:1px solid #6b5530; border-radius:10px; color:#f0d9a8; font-size:12.5px;
  }
  .offline-banner .dot { width:7px; height:7px; border-radius:50%; background:#e0a458; flex-shrink:0; }

  main { flex:1; padding:6px 16px 32px; }

  .note-list-card {
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    margin-bottom:12px; padding:16px; display:flex; align-items:center; gap:12px;
    cursor:pointer; transition:transform 0.15s ease;
  }
  .note-list-card:active { transform:scale(0.98); }
  .note-list-card h3 { margin:0; font-size:15.5px; font-weight:600; flex:1; line-height:1.4; }
  .note-list-card .chev { color:var(--ink-faint); flex-shrink:0; }
  .note-list-card .chev svg { width:18px; height:18px; }
  .note-list-card.locked { opacity:0.75; }
  .note-list-card.locked h3 { color:var(--ink-dim); }
  .note-list-card .lock-badge {
    display:flex; align-items:center; gap:5px; font-size:11px; font-weight:700;
    color:#e0a458; background:rgba(224,164,88,0.14); padding:4px 9px; border-radius:999px; flex-shrink:0;
  }
  .note-list-card .lock-badge svg { width:12px; height:12px; }

  .note-detail-back {
    display:flex; align-items:center; gap:8px; background:none; border:none; color:var(--accent-green-bright);
    padding:6px 0 16px; font-size:14px; font-weight:600; cursor:pointer;
  }
  .note-detail-back svg { width:18px; height:18px; }

  .note-detail-card {
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px;
  }
  .note-detail-card h2 { margin:0 0 14px; font-size:17px; font-weight:700; line-height:1.4; }
  .note-body { color:var(--ink-dim); font-size:14px; line-height:1.6; white-space:pre-wrap; }
  .note-body strong { color:var(--ink); font-weight:700; }
  .note-body em { font-style:italic; }

  main { -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none; user-select:none; }

  .empty-state { text-align:center; padding:56px 20px; color:var(--ink-faint); }
  .empty-state .glyph { font-size:36px; margin-bottom:12px; }
  .empty-state p { margin:0; font-size:14px; }
</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <button class="icon-btn" id="backBtn" aria-label="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <h1 id="pageTitle">Notes</h1>
  </header>

  <div class="offline-banner" id="offlineBanner" hidden>
    <span class="dot"></span> You're offline — showing saved notes
  </div>

  <main id="notesList"></main>
</div>

<script>
  const subjects = [
    { id: "civic-ed",       name: "Civic Education" },
    { id: "english",        name: "English" },
    { id: "ict",            name: "ICT" },
    { id: "mathematics",    name: "Mathematics" },
    { id: "science",        name: "Science" },
    { id: "social-studies", name: "Social Studies" }
  ];

  const params = new URLSearchParams(window.location.search);
  const subjectId = params.get("id");
  const subject = subjects.find(s => s.id === subjectId);

  registerServiceWorker();

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }

  // Lightweight formatting: **bold**, *italic*, "- " bullets.
  // Text is escaped first so nothing typed as a note can inject HTML.
  function renderFormatted(str) {
    let safe = escapeHtml(str);
    safe = safe.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    safe = safe.replace(/\*(.+?)\*/g, "<em>$1</em>");
    safe = safe.replace(/(^|\n)- (.+)/g, "$1• $2");
    return safe;
  }

  // Basic copy deterrents. Note: nothing rendered in a browser can be made
  // 100% uncopyable — a determined person can still use dev tools or a
  // screenshot. This just removes the easy, casual ways to lift content.
  document.addEventListener("contextmenu", (e) => {
    if (e.target.closest("main")) e.preventDefault();
  });
  document.addEventListener("copy", (e) => {
    if (window.getSelection().anchorNode && document.getElementById("notesList")?.contains(window.getSelection().anchorNode)) {
      e.preventDefault();
    }
  });

  // ---- View state: a plain list of topics, or one topic open at a time ----
  let allNotes = [];
  let view = "list";      // 'list' | 'detail'
  let openNoteId = null;
  let userIsPremium = false;

  function renderList() {
    const list = document.getElementById("notesList");
    if (!allNotes.length) {
      list.innerHTML = `<div class="empty-state"><div class="glyph">📭</div><p>No notes have been added for ${escapeHtml(subject.name)} yet.</p></div>`;
      return;
    }
    list.innerHTML = allNotes.map(n => {
      const isLocked = n.is_locked && !userIsPremium;
      return `
        <div class="note-list-card ${isLocked ? "locked" : ""}" data-open="${n.id}">
          <h3>${escapeHtml(n.title)}</h3>
          ${isLocked
            ? `<span class="lock-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 018 0v3"/></svg> Premium</span>`
            : `<span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span>`}
        </div>
      `;
    }).join("");
  }

  function renderDetail(note) {
    const list = document.getElementById("notesList");
    list.innerHTML = `
      <button class="note-detail-back" data-close-note>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        All ${escapeHtml(subject.name)} topics
      </button>
      <div class="note-detail-card">
        <h2>${escapeHtml(note.title)}</h2>
        <div class="note-body">${renderFormatted(note.body)}</div>
      </div>
    `;
    window.scrollTo({ top: 0 });
  }

  function openNote(id) {
    const note = allNotes.find(n => n.id === id);
    if (!note) return;
    if (note.is_locked && !userIsPremium) {
      window.location.href = "upgrade.html";
      return;
    }
    openNoteId = id;
    view = "detail";
    renderDetail(note);
  }

  function closeNote() {
    view = "list";
    openNoteId = null;
    renderList();
  }

  document.getElementById("notesList").addEventListener("click", (e) => {
    const openBtn = e.target.closest("[data-open]");
    if (openBtn) { openNote(openBtn.dataset.open); return; }
    if (e.target.closest("[data-close-note]")) { closeNote(); }
  });

  // Back button: leaves the notes list entirely when in list view,
  // but just closes the open topic (staying on this page) when one is open.
  document.getElementById("backBtn").addEventListener("click", () => {
    if (view === "detail") {
      closeNote();
    } else {
      window.location.href = subject ? `subject.html?id=${encodeURIComponent(subject.id)}` : "classroom-dashboard.html";
    }
  });

  function renderNotes(notes) {
    allNotes = notes;
    view = "list";
    openNoteId = null;
    renderList();
  }

  (async () => {
    const user = await requireUser();
    if (!user) return;

    if (!subject) {
      window.location.href = "classroom-dashboard.html";
      return;
    }

    document.getElementById("pageTitle").textContent = subject.name + " Notes";
    userIsPremium = await isPremiumUser();

    if (!navigator.onLine) {
      document.getElementById("offlineBanner").hidden = false;
      const cached = await offlineStore.getNotes(subject.id);
      renderNotes(cached || []);
      return;
    }

    const { data, error } = await supabaseClient
      .from("notes")
      .select("*")
      .eq("subject_id", subject.id)
      .order("created_at", { ascending: false });

    if (error) {
      // Network hiccup even though we appear online — fall back to cache
      const cached = await offlineStore.getNotes(subject.id);
      renderNotes(cached || []);
      return;
    }

    await offlineStore.cacheNotes(subject.id, data);
    renderNotes(data);
  })();
</script>

</body>
</html>
