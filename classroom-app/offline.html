<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Offline · Classroom</title>
<style>
  :root{ --bg:#2d2d2d; --card:#3d3d3d; --border:#4a4a4a; --ink:#f4f2ee; --ink-dim:#b7b3ab; --accent-green:#2f5c34; }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; min-height:100vh; }
  .wrap { max-width:400px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;
    justify-content:center; align-items:center; padding:32px 24px; text-align:center; }
  .glyph { font-size:44px; margin-bottom:16px; }
  h1 { font-size:20px; font-weight:700; margin:0 0 8px; }
  p { color:var(--ink-dim); font-size:14px; line-height:1.5; margin:0 0 24px; }
  button { background:var(--accent-green); color:#eaf5ea; border:none; border-radius:10px;
    padding:13px 22px; font-size:14.5px; font-weight:600; cursor:pointer; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="glyph">📡</div>
    <h1>You're offline</h1>
    <p>This page hasn't been opened yet, so there's nothing saved for it locally. Pages and notes you've already visited will still work without a connection.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
